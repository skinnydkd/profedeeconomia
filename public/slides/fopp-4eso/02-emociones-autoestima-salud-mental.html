<h1 id="emociones-autoestima-y-salud-mental">Emociones, autoestima y salud mental</h1>
<p>Lo que sientes no es un problema técnico que haya que arreglar deprisa. Es información valiosa que conviene aprender a leer, a regular y, cuando pesa demasiado, a compartir con alguien que pueda ayudarte.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-class="tldr" data-theme="w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh" lang="en-US" class="tldr" data-marpit-pagination="2" style="--paginate:true;--class:tldr;--theme:w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh;" data-marpit-pagination-total="29"><p class="tldr__kicker">TL;DR</p>
<p class="pullquote">La salud mental es la base sobre la que se construye todo lo demás: estudios, relaciones, proyecto de vida. Esta unidad enseña a identificar emociones con criterio, distinguir autoestima sana de soberbia o de autoestima débil, y reconocer cuándo pedir ayuda —y a quién pedírsela—. No es una unidad de motivación; es una unidad de gestión . Las emociones no son enemigas del pensamiento racional: son información. Aprender a leerlas es una de las competencias más útiles que te llevarás de 4.º de la ESO.</p>
</section>

  <p class="caso__kicker">CASO REAL</p>
  <h2>Marta, 16 años: 'es normal pasarlo mal antes de los exámenes... ¿o no?'</h2>
  <p class="caso__body-text">Marta lleva seis meses sintiéndose ansiosa antes de cada examen. No es solo nervios: le tiembla la voz al hablar en público, le cuesta dormir las noches previas y la semana pasada vomitó antes de una exposición. En casa le quitan importancia: «es normal, todos lo pasamos así a tu edad» . Sus amigas le dicen que respire hondo y que confíe más en sí misma. Pero el malestar no se va — ya dura medio curso.</p>
  <p class="caso__pregunta">¿Cómo se distingue un malestar pasajero de algo que ya necesita intervención profesional?</p>
  <p class="caso__fuente">Caso compuesto basado en consultas habituales en orientación de centros de Secundaria</p>

<h2 id="objetivos-de-la-unidad">Objetivos de la unidad</h2>
<ul>
<li>Reconocer las seis emociones primarias de Ekman y diferenciar emoción, sentimiento y estado de ánimo.</li>
<li>Aplicar tres técnicas de regulación emocional ante una situación estresante real.</li>
<li>Distinguir una autoestima sana de una autoestima inflada o débil, y diferenciarla de la autoconfianza.</li>
<li>Analizar críticamente el impacto de las redes sociales sobre el autoconcepto adolescente y la dismorfia digital.</li>
<li>Aplicar la asertividad ante un conflicto personal con la fórmula «yo siento... cuando tú... porque... me gustaría que...».</li>
</ul>
</section>

<h2 id="qu%C3%A9-son-las-emociones-y-por-qu%C3%A9-importan">Qué son las emociones y por qué importan</h2>
<p>Una emoción es una respuesta automática y breve del cuerpo y la mente ante algo que ocurre: un estímulo externo (un comentario en clase, una nota inesperada) o interno (un recuerdo, un pensamiento). Las emociones aparecen rápido —en milisegundos—, duran segundos o minutos y vienen acompañadas de cambios físicos perceptibles: el corazón se acelera, el estómago se cierra, los músculos se tensan o se relajan.<br />
Conviene distinguir tres conceptos que en el lenguaje cotidiano usamos como sinónimos:</p>
<ul>
<li>Emoción : respuesta corta e intensa, ligada a un disparador concreto. Dura segundos o minutos.</li>
<li>Sentimiento : la interpretación consciente de la emoción una vez que el cerebro la procesa. Si la emoción es miedo, el sentimiento puede ser «tengo miedo de no aprobar selectividad». Dura más, está mezclado con tu historia personal.</li>
<li>Estado de ánimo : tono emocional de fondo que dura horas o días. No tiene un disparador único; es la mezcla de muchas emociones recientes. Estar «de bajón» toda la semana es un estado de ánimo, no una emoción.<br />
Saber distinguir las tres cosas ya te da poder: muchas veces lo que llamamos «estar fatal» es un estado de ánimo persistente que podemos rastrear hasta varias emociones concretas que no atendimos a tiempo.</li>
</ul>
<h3 id="las-seis-emociones-primarias-de-ekman">Las seis emociones primarias de Ekman</h3>
<p>El psicólogo estadounidense Paul Ekman publicó en 1972 un estudio transcultural pionero: viajó a tribus de Papúa Nueva Guinea sin contacto previo con cine ni televisión y les mostró fotografías de rostros occidentales. Los participantes identificaron las mismas seis emociones que reconocemos en Madrid o en Tokio. La conclusión fue que existen emociones primarias universales , comunes a toda la especie humana, con expresiones faciales reconocibles en cualquier cultura:</p>
<ul>
<li>Alegría — señal de que algo importante para nosotros va bien.</li>
<li>Tristeza — señal de pérdida o de que algo deseado no se ha cumplido.</li>
<li>Miedo — señal de amenaza percibida; prepara al cuerpo para huir o protegerse.</li>
<li>Asco — señal de rechazo ante algo dañino, sucio o moralmente intolerable.</li>
<li>Ira — señal de injusticia, de límite traspasado o de obstáculo a un objetivo.</li>
<li>Sorpresa — señal de novedad inesperada; abre la atención para procesar lo nuevo.<br />
Cada emoción primaria tiene una función adaptativa : existe porque ayudó a sobrevivir a nuestros ancestros. El miedo nos aleja del peligro, la ira nos hace defender lo nuestro, la tristeza nos invita a parar y reconfigurar, el asco protege de toxinas o conductas dañinas. Ninguna emoción es «mala»; todas son información útil cuando se leen bien.</li>
</ul>
<h3 id="las-emociones-secundarias">Las emociones secundarias</h3>
<p>Sobre las primarias se construyen las emociones secundarias , más complejas, aprendidas en interacción social y cargadas de juicio cultural. Las más relevantes en la adolescencia:</p>
<ul>
<li>Vergüenza : dolor por exponer públicamente algo que considero un defecto.</li>
<li>Culpa : malestar por haber hecho algo que considero incorrecto.</li>
<li>Orgullo : satisfacción por un logro que atribuyo a mi esfuerzo o identidad.</li>
<li>Envidia : malestar al comparar lo que otra persona tiene o consigue con lo mío.</li>
<li>Celos : miedo a perder algo o a alguien por la presencia de un tercero.</li>
<li>Gratitud : reconocimiento de algo bueno recibido de otra persona o circunstancia.<br />
Las emociones secundarias no son universales: una misma situación produce vergüenza intensa en una cultura y orgullo en otra. Reconocerlas requiere un trabajo introspectivo más fino que el de las primarias.</li>
</ul>
</section>

<p class="figure__caption">Daniel Kahneman (1934-2024) demostró que las emociones no son enemigas del pensamiento racional: son parte de cómo decidimos. Su modelo del Sistema 1 (intuitivo, emocional) y Sistema 2 (deliberativo, lento) se desarrolla en detalle en la **Unit 4** (toma de decisiones); aquí lo mencionamos por su relevancia en la regulación emocional.</p>

<h2 id="nota">NOTA</h2>
<p>La regulación emocional no es reprimir lo que sientes ni fingir que estás bien. Es la capacidad de reconocer la emoción, nombrarla con precisión y elegir qué hacer con ella en lugar de reaccionar en automático. Sentir miedo no se elige; cómo respondes al miedo, sí.</p>

<h2 id="c%C3%B3mo-regular-lo-que-sientes-tres-t%C3%A9cnicas-que-funcionan">Cómo regular lo que sientes: tres técnicas que funcionan</h2>
<p>Regular emociones no significa controlarlas con fuerza de voluntad. Significa darles espacio para que se procesen sin que tomen el mando de tus decisiones. La psicología clínica moderna —especialmente la terapia cognitivo-conductual (CBT) y las terapias contextuales como ACT— ha validado decenas de técnicas. Aquí te presentamos tres muy básicas que cualquiera puede practicar.</p>
<h3 id="t%C3%A9cnica-1--respiraci%C3%B3n-4-7-8">Técnica 1 — Respiración 4-7-8</h3>
<p>Es la técnica más rápida para bajar una activación fisiológica intensa: ataque de nervios antes de un examen, discusión que escala, ansiedad antes de hablar en público. Funciona porque alarga la espiración respecto a la inspiración, lo que activa el nervio vago y baja la frecuencia cardiaca en menos de un minuto.</p>
</section>

## Pasos
<ol class="exercise__steps">
  <li>Siéntate o tumbate. Espalda recta, hombros relajados. Si puedes, cierra los ojos.</li>
  <li>Inspira por la nariz contando hasta 4. Llena el abdomen, no solo el pecho.</li>
  <li>Retén el aire contando hasta 7. Sin tensar, simplemente espera.</li>
  <li>Espira por la boca contando hasta 8. Despacio, dejando un sonido suave.</li>
  <li>Repite el ciclo 4 veces la primera vez; con práctica puedes hacer 6 u 8 ciclos.</li>
  <li>Practica dos veces al día aunque no estés nervioso. La técnica funciona mucho mejor cuando ya la has entrenado en frío que cuando la improvisas en plena crisis.</li>
</ol>
</section>

<h3 id="t%C3%A9cnica-2--reencuadre-cognitivo">Técnica 2 — Reencuadre cognitivo</h3>
<p>Inspirada en la terapia cognitivo-conductual de Aaron Beck. La idea base: entre el estímulo (lo que ocurre) y la emoción (lo que sientes) hay un pensamiento intermedio —casi siempre automático— que interpreta el estímulo. Cambiar ese pensamiento cambia la emoción.<br />
Ejemplo: tu mejor amigo no te contesta al WhatsApp en toda la tarde. Pensamiento automático: «Está enfadado conmigo, me está ignorando» . Emoción: ansiedad y enfado. Reencuadre posible: «A lo mejor está estudiando o se ha quedado sin batería; lo confirmaré cuando hablemos» . Emoción: tranquilidad y curiosidad.<br />
El reencuadre no es engañarse ni «pensar en positivo». Es buscar interpretaciones alternativas plausibles y quedarse con la más completa, no con la primera que se te ocurre.</p>
<h3 id="t%C3%A9cnica-3--distanciamiento-ling%C3%BC%C3%ADstico">Técnica 3 — Distanciamiento lingüístico</h3>
<p>Una de las herramientas más sencillas y mejor validadas viene de los estudios de Ethan Kross (Universidad de Michigan): cambia el lenguaje con el que te hablas a ti mismo. En vez de decirte «soy un desastre, no valgo para nada» , prueba «estoy notando que ahora me siento un desastre» o «esto me está pasando hoy» . Hablarte como si fueras una tercera persona o usar verbos de proceso («me está pasando») en vez de verbos de identidad («soy») reduce la intensidad emocional sin negar la experiencia.<br />
Las tres técnicas son complementarias. En crisis intensa: respiración. En pensamientos rumiantes que dan vueltas: reencuadre. En autocrítica destructiva: distanciamiento.</p>
</section>

<h2 id="ansiedad-y-frustraci%C3%B3n-en-la-adolescencia">Ansiedad y frustración en la adolescencia</h2>
<p>La ansiedad es la emoción de la que más se habla hoy, y conviene entenderla bien para no confundir lo normal con lo patológico.</p>
<h3 id="qu%C3%A9-es-la-ansiedad-normal">Qué es la ansiedad normal</h3>
<p>La ansiedad es miedo anticipatorio : el cuerpo se prepara para una amenaza que aún no ha ocurrido. Antes de un examen, una entrevista, una conversación difícil. En dosis adecuadas, la ansiedad mejora el rendimiento : te mantiene alerta, te ayuda a estudiar la noche antes, te empuja a prepararte. Una persona sin ningún nivel de ansiedad ante un examen importante probablemente no estudiaría.<br />
El problema aparece cuando la ansiedad se desproporciona respecto al estímulo, dura demasiado o aparece sin disparador claro . Ahí pasamos de la ansiedad normal a un posible trastorno de ansiedad.</p>
<h3 id="el-panorama-espa%C3%B1ol">El panorama español</h3>
<p>Los datos del Ministerio de Sanidad (Encuesta Nacional de Salud 2023) son contundentes: alrededor del 25 % de adolescentes españoles entre 15 y 24 años declara haber sufrido síntomas de ansiedad clínicamente significativos en el último año. La cifra se ha duplicado en menos de una década. Los servicios públicos de salud mental tienen listas de espera de meses y la sociedad española de psiquiatría infanto-juvenil (SEPYPNA) lleva años advirtiendo de la falta de recursos.<br />
No te asustes con los datos: el aumento es real, pero también lo es que ahora hablamos de algo que antes se silenciaba . Una parte del incremento estadístico es buena noticia: significa que más adolescentes reconocen lo que les pasa y piden ayuda.</p>
<h3 id="frustraci%C3%B3n-la-emoci%C3%B3n-del-%C2%ABno-esperaba-esto%C2%BB">Frustración: la emoción del «no esperaba esto»</h3>
<p>La frustración aparece cuando un objetivo que perseguías se bloquea o cuando algo no sale como esperabas. La nota baja, el equipo de la liga pierde, la persona que te gusta no te responde. Es una mezcla de tristeza por la pérdida y de ira por el obstáculo. La adolescencia es una etapa especialmente frustrante porque acumula muchas «primeras veces» que aún no sabes manejar.<br />
Tolerar la frustración —aceptar que las cosas no siempre salen como uno quiere y seguir funcionando— es una habilidad que se entrena. Las personas con baja tolerancia a la frustración tienden a abandonar tareas a las primeras dificultades, a explotar emocionalmente o a quedarse paralizadas. Las técnicas de regulación que viste antes son las mismas que se aplican aquí.</p>
</section>

<h2 id="jonathan-haidt-y-la-generaci%C3%B3n-ansiosa">Jonathan Haidt y la generación ansiosa</h2>
<p>En The Anxious Generation (2024), el psicólogo social Jonathan Haidt sostiene que la entrada masiva de los smartphones en la vida adolescente entre 2010 y 2015 desencadenó una crisis global de salud mental sin precedentes. Compara series temporales de ansiedad, depresión y autolesiones en chicas adolescentes de EE.UU., Reino Unido, Canadá y los países nórdicos: todas se disparan a partir de 2012, coincidiendo con la generalización de Instagram en menores de edad. Su tesis ha sido discutida —algunos investigadores como Andrew Przybylski señalan que la correlación no implica causalidad—, pero el debate ha llegado a las políticas públicas: España aprobó en 2024 la prohibición del móvil en horario escolar, y varios países europeos preparan restricciones de redes para menores de 16 años.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh;" data-marpit-pagination-total="29">
<h2 id="autoestima-y-autoconcepto-la-mirada-que-te-diriges">Autoestima y autoconcepto: la mirada que te diriges</h2>
<p>Aquí entramos en la parte más delicada de la unidad. Lo que piensas sobre ti mismo condiciona lo que te atreves a intentar, las relaciones que aceptas y los proyectos que decides perseguir.</p>
<h3 id="diferencia-entre-autoconcepto-y-autoestima">Diferencia entre autoconcepto y autoestima</h3>
<ul>
<li>Autoconcepto : la descripción que haces de ti mismo. Es cognitivo, casi neutral. «Soy alto, se me da bien dibujar, hablo dos idiomas, soy tímido en grupos grandes.» Es tu retrato.</li>
<li>Autoestima : la valoración emocional que haces de ese retrato. Es afectiva. «Me gusta cómo soy» o «no me gusta nada cómo soy». Es la nota que te pones a ti mismo.<br />
Puedes tener un autoconcepto preciso (te conoces bien) y, aun así, una autoestima baja (no te aceptas). Y al revés: hay personas con autoestima alta que tienen un autoconcepto distorsionado (creen que son geniales en cosas que no dominan).</li>
</ul>
<h3 id="autoestima-sana-inflada-y-d%C3%A9bil">Autoestima sana, inflada y débil</h3>
<p>La autoestima no es «cuanto más alta, mejor». La psicología distingue tres patrones, y solo uno es funcional:</p>
<ul>
<li>Autoestima sana : te aceptas como eres, reconoces tus fortalezas y tus límites sin dramatizar, asumes errores sin hundirte y aceptas las críticas sin sentirte atacado.</li>
<li>Autoestima inflada (narcisista) : te crees superior a los demás, no toleras la crítica, atribuyes los éxitos a ti mismo y los fracasos a otros. Aparentemente alta, en realidad frágil : cualquier pinchazo se vive como ataque.</li>
<li>Autoestima débil (baja) : te subestimas, te comparas constantemente a la baja, te culpas por todo, evitas riesgos por miedo al fracaso, aceptas malos tratos por creer que no mereces algo mejor.<br />
Conviene no confundir autoestima con autoconfianza : la autoconfianza es la creencia de que puedes hacer algo concreto (resolver un problema, hablar en público); la autoestima es el aprecio hacia quien eres . Se puede tener mucha autoconfianza en lo técnico y baja autoestima personal, y al revés.</li>
</ul>
<h3 id="la-trampa-de-la-comparaci%C3%B3n-social-en-redes">La trampa de la comparación social en redes</h3>
<p>Aquí es donde la adolescencia del siglo XXI tiene un campo de minas que ninguna generación anterior tuvo. Las redes sociales —Instagram, TikTok, BeReal, Snapchat— operan sobre un mecanismo psicológico básico: la comparación social , que el sociólogo Leon Festinger describió ya en 1954. Comparamos para situarnos. Antes lo hacíamos con el grupo del barrio o del instituto; ahora lo hacemos con un feed infinito de gente seleccionada, retocada y editada para parecer mejor que nosotros.<br />
El estudio longitudinal más citado sobre este tema es el de Jean Twenge y colaboradores publicado en Lancet Public Health (2023): siguiendo a más de un millón de adolescentes en EE.UU. y Reino Unido, encuentran una correlación clara entre horas de uso de redes sociales y aumento de síntomas depresivos, especialmente en chicas de 13 a 17 años. La correlación es más fuerte cuanto más pasivo es el uso ( scroll infinito) y más débil cuando el uso es activo y dirigido (mensajes a personas conocidas).</p>
<h3 id="dismorfia-digital">Dismorfia digital</h3>
<p>Un dato que conviene tener en mente: según la encuesta de la OCU (Organización de Consumidores y Usuarios) publicada en 2024, el 80 % de las adolescentes españolas entre 13 y 18 años ha retocado al menos una vez una foto suya antes de publicarla en redes. Filtros, FaceTune, Snow, retoque de cintura, alisado de piel. Lo llamamos dismorfia digital : la distorsión entre la imagen real de uno mismo y la imagen que uno proyecta —y ve proyectada por otros— en pantallas.<br />
La consecuencia clínica empieza a documentarse: cirujanos plásticos en EE.UU. y Reino Unido reportan pacientes adolescentes que piden parecerse a su propia foto filtrada , no a una persona famosa. La frontera entre el yo real y el yo digital se vuelve borrosa cuando llevas años viendo solo la versión retocada.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-class="example" data-theme="w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh" lang="en-US" class="example" data-marpit-pagination="16" style="--paginate:true;--class:example;--theme:w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh;" data-marpit-pagination-total="29"><p class="example__kicker">Caso real</p>
<h2 id="ejemplo-real">Ejemplo real</h2>
<div class="example__body">En los Juegos Olímpicos de Tokio 2021, la gimnasta estadounidense Simone Biles se retiró de varias finales para proteger su salud mental ante un bloqueo psicológico conocido como twisties . Su decisión, históricamente impensable en la élite deportiva, abrió un debate global. La badmintonista española Carolina Marín, tres veces campeona del mundo, ha hablado abiertamente desde 2022 sobre la depresión que vivió tras lesiones graves y sobre el trabajo psicológico continuo que mantiene para competir. Casos como estos han cambiado la percepción social: pedir ayuda psicológica ya no se ve como debilidad, sino como una competencia profesional más, equivalente a la preparación física. Para vuestra generación, normalizar esta conversación en el deporte es una de las mejores noticias culturales de los últimos años.</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh;" data-marpit-pagination-total="29">
<h2 id="asertividad-defender-lo-tuyo-sin-pisar-al-otro">Asertividad: defender lo tuyo sin pisar al otro</h2>
<p>La asertividad es la habilidad de expresar lo que piensas, sientes y necesitas de forma honesta y respetuosa , sin agredir al otro ni ceder a la primera. Es la zona media entre dos extremos disfuncionales:</p>
<ul>
<li>Pasividad : callas lo que sientes para no molestar. Resultado: se acumula resentimiento, los demás aprenden que pueden pasar por encima de ti.</li>
<li>Agresividad : expresas lo que sientes a costa del otro, con tono hostil, descalificaciones o amenazas. Resultado: ganas la batalla y pierdes la relación.</li>
<li>Asertividad : expresas lo que sientes con claridad, sin atacar y dejando espacio al otro para responder. Resultado: el conflicto se aborda sin destruir el vínculo.</li>
</ul>
<h3 id="la-f%C3%B3rmula-del-%C2%AByo-siento%C2%BB">La fórmula del «yo siento»</h3>
<p>Una herramienta concreta para entrenar asertividad en conflictos personales viene de la Comunicación No Violenta del psicólogo Marshall Rosenberg. Tiene cuatro pasos:</p>
<ul>
<li>«Yo siento...» — Nombras tu emoción («yo siento rabia», «me siento dolida», «estoy frustrado»). No empiezas atacando.</li>
<li>«...cuando tú...» — Describes el hecho concreto, sin generalizar ni interpretar. No dices «cuando tú eres egoísta», dices «cuando tú no contestas al WhatsApp en todo el día».</li>
<li>«...porque...» — Explicas el motivo desde tu necesidad, no desde el juicio. «Porque necesito saber que estamos bien», no «porque eres un mal amigo».</li>
<li>«...me gustaría que...» — Propones una alternativa concreta. «Me gustaría que me avisaras con un mensaje rápido si vas a estar desconectado mucho rato.»<br />
Ejemplo completo: «Me siento incómoda cuando interrumpes mis frases en clase, porque siento que no se me escucha. Me gustaría que me dejaras terminar y luego das tu opinión.»<br />
Practícalo primero en frío, sobre una situación que ya ocurrió. En caliente cuesta mucho más, pero con entrenamiento sale natural.</li>
</ul>
</section>

<h2 id="pensamiento-cr%C3%ADtico-y-creatividad-aplicadas-a-tu-propia-vida">Pensamiento crítico y creatividad aplicadas a tu propia vida</h2>
<p>El currículo cierra el Bloque A con dos competencias que parecen propias de otra asignatura pero son cruciales aquí: el pensamiento crítico (preguntar, dudar, contrastar fuentes) y la creatividad (combinar ideas existentes de forma nueva). Aplicadas a tu propia trayectoria, sirven para no creerte la primera versión que te llegue: ni la de los algoritmos, ni la de tu entorno familiar, ni siquiera la tuya en un mal día.<br />
Pensamiento crítico aplicado a ti: cuestiona el pensamiento automático («no valgo para nada»), busca evidencia en contra («pero ayer terminé este proyecto», «la profesora me felicitó la semana pasada»), elige la interpretación más completa. Creatividad aplicada a ti: imagina trayectorias vitales distintas a las que asumes por defecto, combina intereses aparentemente incompatibles (las carreras híbridas son cada vez más comunes), prueba pequeños experimentos vitales sin compromiso eterno.</p>
</section>

<h2 id="cu%C3%A1ndo-lo-que-sientes-pide-ayuda-profesional">Cuándo lo que sientes pide ayuda profesional</h2>
<p>Hablamos de salud mental con normalidad porque, como con la salud física, lo importante es detectar a tiempo . Hay tres señales que conviene tomar en serio cuando aparecen juntas o cuando duran varias semanas:</p>
<ul>
<li>Insomnio persistente : te cuesta dormir, te despiertas muchas veces, te despiertas muy pronto y no puedes volver a dormir. Más de dos semanas seguidas.</li>
<li>Aislamiento social : dejas de quedar con personas que antes veías, evitas actividades que disfrutabas, sientes que estar con gente cuesta un esfuerzo enorme.</li>
<li>Ideación suicida : pensamientos recurrentes de hacerte daño o de no querer seguir viviendo. Cualquier intensidad cuenta : una sola vez ya es motivo para hablar con un adulto de confianza o una línea de ayuda.<br />
Pedir ayuda no es debilidad ni dramatismo. Es la decisión inteligente, igual que ir al médico cuando llevas una semana con fiebre. Hay profesionales —psicólogos, psiquiatras, trabajadores sociales— cuyo trabajo es exactamente eso: ayudarte a entender qué te pasa y darte herramientas para gestionarlo.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-class="curiosity" data-theme="w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh" lang="en-US" class="curiosity" data-marpit-pagination="21" style="--paginate:true;--class:curiosity;--theme:w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh;" data-marpit-pagination-total="29">
<h2 id="nota-1">NOTA</h2>
<p>Línea 024 — Teléfono de atención a la conducta suicida del Ministerio de Sanidad. Atención 24 horas, gratuita, confidencial, atendida por profesionales. Llama si tienes pensamientos de hacerte daño, o si quieres ayudar a alguien que los tiene. ColeKonsulta de la Fundación ANAR — Atención psicológica gratuita para menores de 18 años, presencial y telefónica. Teléfono ANAR 900 20 20 10, también gratuito y confidencial. Teléfono de la Esperanza — 717 003 717. Escucha activa, 24 horas, anónimo. Tu tutor o tu orientador del instituto — Pueden derivarte al Equipo de Orientación Educativa o coordinar con tu médico de cabecera el acceso al servicio público de salud mental. Tu médico de cabecera — La puerta de entrada al psicólogo del sistema sanitario público. No estás obligado a saber qué te pasa antes de pedir ayuda. Llamar y decir «no estoy bien y no sé por qué» ya es un paso válido.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh;" data-marpit-pagination-total="29">
<h3 id="conexi%C3%B3n-con-el-proyecto-de-vida">Conexión con el proyecto de vida</h3>
<p>Esta unidad alimenta el proyecto capstone de la Unidad 10 con dos entregables: tu «mapa emocional» personal —qué emociones predominan en tu día a día, qué disparadores las activan, qué técnicas de regulación quieres entrenar— y un autoanálisis de uso de redes —cuántas horas al día, qué tipo de cuentas sigues, cómo te sientes después de cada sesión—. Ambos cuadernos los retomaremos al final de curso para ver tu evolución.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh;" data-marpit-pagination-total="29">
<h2 id="glosario">Glosario</h2>
<ul>
<li>Emoción : respuesta automática, corta e intensa del cuerpo y la mente ante un disparador concreto. Dura segundos o minutos y va acompañada de cambios físicos perceptibles.</li>
<li>Sentimiento : interpretación consciente de una emoción una vez que el cerebro la procesa. Dura más que la emoción y está mezclado con tu historia personal.</li>
<li>Estado de ánimo : tono emocional de fondo que dura horas o días, sin un disparador único. Es la mezcla de muchas emociones recientes.</li>
<li>Emociones primarias : las seis emociones universales identificadas por Ekman —alegría, tristeza, miedo, asco, ira y sorpresa—, reconocibles en cualquier cultura y con función adaptativa.</li>
<li>Emociones secundarias : emociones más complejas y aprendidas socialmente (vergüenza, culpa, orgullo, envidia, celos, gratitud) que se construyen sobre las primarias y varían según la cultura.</li>
<li>Regulación emocional : capacidad de reconocer una emoción, nombrarla con precisión y elegir qué hacer con ella, en lugar de reaccionar en automático. No es reprimir ni fingir.</li>
<li>Ansiedad : miedo anticipatorio ante una amenaza que aún no ha ocurrido. En dosis adecuadas mejora el rendimiento; se vuelve problema cuando se desproporciona, dura demasiado o aparece sin disparador claro.</li>
<li>Tolerancia a la frustración : habilidad, entrenable, de aceptar que las cosas no siempre salen como uno quiere y seguir funcionando sin abandonar, explotar ni paralizarse.</li>
<li>Autoconcepto : descripción cognitiva que haces de ti mismo. Es tu retrato.</li>
<li>Autoestima : valoración emocional que haces de ese retrato. Puede ser sana, inflada (narcisista, en realidad frágil) o débil (baja).</li>
<li>Autoconfianza : creencia de que puedes hacer algo concreto. Se distingue de la autoestima, que es el aprecio hacia quien eres.</li>
<li>Comparación social : mecanismo descrito por Festinger por el cual nos situamos comparándonos con otros. En redes se distorsiona al comparar nuestro día normal con el mejor minuto editado de cien personas.</li>
<li>Dismorfia digital : distorsión entre la imagen real de uno mismo y la imagen retocada que uno proyecta —y ve proyectada— en pantallas.</li>
<li>Asertividad : habilidad de expresar lo que piensas, sientes y necesitas de forma honesta y respetuosa, sin agredir al otro ni ceder a la primera. Es la zona media entre la pasividad y la agresividad.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh;" data-marpit-pagination-total="29">
<h2 id="para-profundizar">Para profundizar</h2>
<p>Si esta unidad te ha interesado, aquí van algunos recursos para ir más allá. Algunos tratan temas delicados con seriedad; míralos con calma:</p>
<ul>
<li>The skill of self-confidence — charla TEDx de Ivan Joseph (2012, subtítulos en español). Por qué encaja: explica la autoconfianza como una habilidad entrenable, no un don, con ejemplos accesibles para adolescentes.</li>
<li>The power of vulnerability — charla TED de Brené Brown (2010). Por qué encaja: una de las charlas más vistas sobre vergüenza, conexión y aceptación de uno mismo; conecta con la autoestima sana de la unidad.</li>
<li>Comunicación No Violenta: un lenguaje de vida — Marshall B. Rosenberg (ed. española, Acanto). Por qué encaja: el manual original de la fórmula «yo siento… cuando tú… porque… me gustaría que…» que practicamos en clase.</li>
<li>PortalCLIC y materiales de la Confederación SALUD MENTAL ESPAÑA . Por qué encaja: recursos divulgativos rigurosos sobre salud mental adolescente, pensados para jóvenes y docentes, sin alarmismo. Acceso libre en consaludmental.org.</li>
<li>Tus amigos psicólogos o Entiende tu mente — pódcasts de psicología divulgativa en castellano . Por qué encaja: episodios breves sobre ansiedad, autoestima y regulación emocional, en un tono cercano y sin tecnicismos.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:w0ztg1ggczezl58zyiz3ymsiyym43exp8hb76jlvh;" data-marpit-pagination-total="29">
<h2 id="preguntas-para-reflexionar">Preguntas para reflexionar</h2>
<p>Estas preguntas no buscan que compartas nada que no quieras compartir. Sirven para pensar en frío, a solas o en clase, y para ayudarte a leer mejor lo que sientes:</p>
<ul>
<li>La próxima vez que notes una emoción intensa, ¿qué nombre concreto le pondrías —más allá de «estoy mal»—? Distinguir entre miedo, frustración, tristeza o vergüenza, ¿cambia lo que harías a continuación?</li>
<li>¿Cómo te sientes, en general, después de pasar un rato largo en redes sociales? ¿Y después de quedar en persona con alguien que te importa? ¿Qué te dice esa diferencia sobre cómo quieres usar tu tiempo?</li>
<li>Imagina que un amigo te dice que lleva semanas durmiendo mal y sin ganas de quedar con nadie. ¿Qué le dirías? ¿Sabrías indicarle a quién o a qué recurso acudir? (Esa misma respuesta vale para ti.)</li>
</ul>

<div class="caso__body">
  <p class="caso__kicker">VUELVE AL CASO</p>
  <p class="caso__body-text">La línea entre un malestar pasajero y un problema que necesita ayuda no siempre es clara, pero hay señales de alarma reconocibles : el malestar dura más de dos semanas , interfiere con la vida diaria (dormir, comer, estudiar, salir), o lleva a evitar situaciones cotidianas (no presentarse a exámenes, faltar a clase, dejar de quedar con gente). Marta cumple las tres. Marta no tiene que «aguantar» ni «confiar más en sí misma». La respuesta razonable es pedir ayuda al orientador del centro , hablar con el médico de cabecera o, si necesita escucha inmediata, llamar a la Línea 024 o al Teléfono de la Esperanza (717 003 717) — son gratuitos, anónimos y atendidos por profesionales. La salud mental se gestiona , no se aguanta. Y pedir ayuda no es debilidad: es la decisión inteligente.</p>
</div>
</section>

<h2 id="lo-esencial-de-la-unidad-2">Lo esencial de la Unidad 2</h2>
<ul>
<li>Seis emociones primarias (Ekman 1972): alegría, tristeza, miedo, asco, ira, sorpresa. Universales, con función adaptativa. Ninguna es buena ni mala.</li>
<li>Emoción ≠ sentimiento ≠ estado de ánimo : dura segundos, dura horas, dura días. Distinguir los tres ya te da poder.</li>
<li>Tres técnicas de regulación : respiración 4-7-8 (crisis), reencuadre cognitivo (rumiación), distanciamiento lingüístico (autocrítica). Entrénalas en frío.</li>
<li>Ansiedad normal vs trastorno : la primera mejora el rendimiento, el segundo lo bloquea. Si dura semanas o no tiene disparador claro, consulta.</li>
<li>Autoestima sana ≠ inflada ≠ débil : la sana acepta errores y críticas sin hundirse. La inflada parece fuerte pero es frágil.</li>
<li>El 80 % de las adolescentes españolas retoca fotos antes de publicar (OCU 2024). La dismorfia digital existe y tiene consecuencias clínicas.</li>
<li>Asertividad : «Yo siento... cuando tú... porque... me gustaría que...» Es la zona media entre callar y atacar.</li>
<li>Tres señales de alarma : insomnio persistente, aislamiento, ideación suicida. La línea 024 está disponible 24 horas y es gratuita.</li>
</ul>
</section>

  <div class="mf__icon">§</div>
  <div class="mf__type">Leer</div>
  <div class="mf__title">Pensar rápido, pensar despacio</div>
  <div class="mf__author">Daniel Kahneman · Debate, 2012</div>
  <div class="mf__desc">Los capítulos sobre el sistema 1 y las emociones explican por qué nuestras decisiones bajo presión no son las mismas que tomaríamos en frío. Lectura larga pero accesible si se va por partes.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">▶</div>
  <div class="mf__type">Ver</div>
  <div class="mf__title">There\</div>
  <div class="mf__author">Sangu Delle · TED Talk · ~9 min</div>
  <div class="mf__desc">Un testimonio breve y directo contra el estigma de pedir ayuda psicológica. Subtítulos en español disponibles en la web de TED.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">@</div>
  <div class="mf__type">Seguir</div>
  <div class="mf__title">@psicowisdom</div>
  <div class="mf__author">Instagram · Divulgación de psicología clínica</div>
  <div class="mf__desc">Contenido breve, riguroso y sin clichés sobre ansiedad, autoestima y salud mental adolescente. Buena alternativa a los gurús de coaching emocional.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">✎</div>
  <div class="mf__type">Hacer</div>
  <div class="mf__title">Tres emociones, tres situaciones</div>
  <div class="mf__author">20-30 min</div>
  <div class="mf__desc">Identifica tres emociones que sientas con frecuencia (pueden ser primarias o secundarias). Para cada una, escribe la situación concreta que suele dispararla y qué haces normalmente con ella. No hay que compartirlo si no quieres; el ejercicio es para ti. Rueda voluntaria en círculo: quien quiera comparte una emoción que le preocupa o una que le hace bien, sin presión de explicarse. El docente recuerda al inicio las reglas: no se interrumpe, no se opina, no se sale del aula a contarlo. Cierre: el grupo identifica las dos o tres emociones más mencionadas y debate brevemente qué podría ayudar a gestionarlas mejor. Duración: 30-40 min.</div>
</div>
</section>
