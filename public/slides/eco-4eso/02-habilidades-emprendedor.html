<h1 id="habilidades-del-emprendedor">Habilidades del emprendedor</h1>
<p>Emprender no es un don con el que se nace, sino un conjunto de habilidades que se entrenan: hablar y escuchar bien, trabajar con otras personas, inventar cosas y aprender de los tropiezos.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-class="tldr" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" class="tldr" data-marpit-pagination="2" style="--paginate:true;--class:tldr;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32"><p class="tldr__kicker">TL;DR</p>
<p class="pullquote">Lo que diferencia a quien saca adelante un proyecto no son rasgos heredados, sino habilidades aprendidas : comunicación, escucha, trabajo en equipo, creatividad y manejo del fracaso. En esta unidad las enumeramos, vemos cómo se entrenan y cómo distinguir la mentalidad fija de la mentalidad de crecimiento (Dweck).</p>
</section>

  <h2>Una charcutera de pueblo, sin formación culinaria, gana 7 estrellas Michelin</h2>
  <p class="caso__body-text">Carme Ruscalleda empezó trabajando en la charcutería familiar de Sant Pol de Mar (Maresme) sin haber estudiado cocina. A los 36 años —edad a la que muchos chefs ya están consolidados— abrió su primer restaurante, Sant Pau . Treinta años después había acumulado 7 estrellas Michelin (entre Sant Pau, su restaurante de Tokio y Moments en Barcelona), un récord para una cocinera en el mundo. Nadie le regaló el camino: copió, viajó, leyó, ensayó. Cada año, decía, intentaba aprender algo nuevo que el anterior no sabía.</p>
  <p class="caso__pregunta">¿Qué habilidades adquirió y cuáles se le suponen «innatas»?</p>
  <p class="caso__fuente">Adaptado de entrevistas a Carme Ruscalleda · 1988-2018</p>

<h2 id="objetivos-de-la-unidad">Objetivos de la unidad</h2>
<ul>
<li>Reconocer seis habilidades clave del perfil emprendedor (tres sociales y tres cognitivas) y poner ejemplos cotidianos de cada una.</li>
<li>Practicar dos técnicas de creatividad —brainstorming y SCAMPER— aplicándolas a un objeto o servicio del entorno del alumnado.</li>
<li>Distinguir la mentalidad fija de la mentalidad de crecimiento de Carol Dweck y aplicar la distinción a situaciones reales del aula.</li>
<li>Identificar al menos tres estrategias concretas para tratar el fracaso como aprendizaje y no como veredicto definitivo.</li>
</ul>
</section>

<h2 id="tres-habilidades-sociales-hablar-escuchar-y-trabajar-con-otros">Tres habilidades sociales: hablar, escuchar y trabajar con otros</h2>
<p>Las habilidades sociales son las que se ponen en juego cuando hay otras personas alrededor. Como casi todo en emprendimiento ocurre con otras personas —clientes, compañeros de equipo, proveedores, familia que apoya o no—, sin estas habilidades el resto no sirve de mucho.</p>
<h3 id="comunicaci%C3%B3n-efectiva">Comunicación efectiva</h3>
<p>Comunicar bien no es hablar mucho ni usar palabras complicadas. Es lograr que la persona que escucha entienda exactamente lo que queremos decir y, además, recuerde la parte importante. En contextos de aula, esto se nota cuando alguien explica una idea de grupo y la clase la pilla a la primera, frente a alguien que explica lo mismo y obliga a tres rondas de preguntas.<br />
Tres elementos hacen que un mensaje funcione:</p>
<ul>
<li>Estructura clara : primero el titular, después la explicación, después un ejemplo. Si quien escucha se pierde en la frase 2, no se recupera en la frase 8.</li>
<li>Lenguaje adaptado al receptor : a un compañero de clase no se le habla igual que a un jurado de un concurso, ni a un cliente potencial igual que a la familia.</li>
<li>Lenguaje no verbal coherente : mirar a quien escucha, no esconderse detrás de las diapositivas, hablar con un volumen audible y dejar pausas para que la información se asiente.<br />
En la Unidad 10 entrenaremos un formato específico de comunicación —el pitch — donde estos tres elementos se llevan al extremo: explicar un proyecto entero en 30 segundos o en 5 minutos sin perder al oyente.</li>
</ul>
<h3 id="escucha-activa">Escucha activa</h3>
<p>Escuchar es la habilidad más subestimada de cualquier proyecto. La mayoría de personas, cuando otra está hablando, no escuchan: están esperando su turno para responder , repasando mentalmente lo que van a decir. Eso no es escuchar; eso es callar.<br />
La escucha activa es algo distinto: implica prestar atención completa al mensaje, hacer preguntas para asegurarte de que entiendes, reformular con tus propias palabras lo que la otra persona ha dicho y comprobar que has entendido bien. Suena obvio cuando se describe, pero es muy raro verlo en la práctica. Quien aprende a escuchar de verdad descubre que la otra persona da información que se le había pasado por alto en la primera ronda.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-class="curiosity" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" class="curiosity" data-marpit-pagination="7" style="--paginate:true;--class:curiosity;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h2 id="nota">NOTA</h2>
<p>Escuchar activamente no es callarse mientras la otra persona habla; es prestar atención completa, reformular lo escuchado con tus propias palabras y preguntar lo que no queda claro , posponiendo tu respuesta hasta haber entendido del todo. Es la habilidad que más diferencia a los buenos equipos de los malos.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<p>En entrevistas con clientes potenciales —algo que haréis varias veces durante el proyecto capstone— la escucha activa es la diferencia entre llevarse información útil a casa o salir solo con la confirmación de lo que ya pensabais. Quien escucha bien detecta necesidades que el propio cliente no había sabido formular.</p>
<h3 id="trabajo-en-equipo">Trabajo en equipo</h3>
<p>Casi nadie emprende solo. Incluso los autónomos trabajan con clientes, proveedores y colaboradores ocasionales. Y en el aula, el proyecto capstone es siempre en grupo. Trabajar en equipo bien no significa llevarse de maravilla con todos —eso es imposible—; significa producir un buen resultado conjunto aunque haya diferencias .<br />
Los equipos que funcionan tienen, casi siempre, tres cosas claras desde el principio:</p>
<ul>
<li>Roles definidos : quién hace qué, quién decide qué, quién revisa qué. La pregunta «¿esto quién lo hace?» nunca debería quedar sin respuesta más de cinco minutos.</li>
<li>Reglas de comunicación : cuándo y por dónde se habla del proyecto (mensaje de grupo, reunión semanal), qué se decide en grupo y qué decide cada persona en su rol.</li>
<li>Forma de resolver conflictos : cuando hay desacuerdo, ¿se vota?, ¿decide el responsable del área?, ¿se busca consenso? Definirlo antes de tener el conflicto evita que el conflicto destruya al equipo.<br />
Un equipo sin claridad de roles funciona unas semanas por buena voluntad y se rompe en cuanto aparece la primera fricción. Veremos esto con más detalle en la Unidad 6, dedicada íntegramente a recursos humanos y equipos.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h2 id="tres-habilidades-cognitivas-pensar-bien-crear-y-gestionar-emociones">Tres habilidades cognitivas: pensar bien, crear y gestionar emociones</h2>
<p>Las habilidades cognitivas son las que ocurren dentro de la cabeza de cada persona. No son menos importantes que las sociales; lo que pasa es que se ven menos desde fuera.</p>
<h3 id="creatividad">Creatividad</h3>
<p>Creatividad no es esperar a que llegue la inspiración mientras miras el techo. Es una habilidad entrenable que consiste en combinar elementos que ya existen de formas nuevas. La mayoría de inventos famosos no aparecieron de la nada: combinaron cosas conocidas de un modo que nadie había probado. La rueda con el equipaje (maleta con ruedas, 1970), el café con leche en vaso para llevar (Starbucks, años 80), la bicicleta sin pedales para aprender a montar (Like-a-Bike, 1997). Ninguno requería inventar nada nuevo; requería ver la combinación.<br />
A esta forma de pensar la llamamos pensamiento divergente : en lugar de buscar la única respuesta correcta a una pregunta, generar muchas respuestas posibles, incluso las que parezcan absurdas. Es lo contrario del pensamiento convergente del examen tipo test, donde solo hay una opción correcta. Las dos son útiles; pero la creatividad vive en la divergente. Más abajo, en el apartado dedicado a las técnicas (brainstorming y SCAMPER), veréis cómo se entrena de forma sistemática.</p>
<h3 id="pensamiento-cr%C3%ADtico">Pensamiento crítico</h3>
<p>Pensar críticamente no es ser negativo ni desconfiar de todo. Es someter las ideas —propias y ajenas— a una revisión razonable antes de actuar sobre ellas . Tres preguntas funcionan casi siempre:</p>
<ul>
<li>¿Esta afirmación está apoyada por datos o solo por una intuición fuerte?</li>
<li>¿Quién dice esto y qué interés tiene en que yo lo crea?</li>
<li>Si esto fuera falso, ¿cómo lo sabríamos?<br />
El pensamiento crítico se vuelve especialmente útil en dos momentos del proyecto: cuando alguien del equipo propone una idea brillante a la una de la madrugada, y cuando un cliente potencial nos dice que «esto le encantaría» . En los dos casos hay que parar y preguntar: ¿de verdad? ¿con qué evidencia? Distinguir entusiasmo de evidencia ahorra muchas semanas de trabajo en una dirección equivocada.</li>
</ul>
<h3 id="gesti%C3%B3n-emocional">Gestión emocional</h3>
<p>Emprender —y la vida en general— produce emociones intensas: ilusión cuando una idea funciona, miedo cuando hay que hablar en público, frustración cuando un cliente se retira, alegría cuando llega la primera venta, ansiedad cuando se acerca el plazo de un examen o de una entrega. La gestión emocional no consiste en no sentir esas emociones —eso es imposible y, además, sería preocupante— sino en reconocerlas, ponerles nombre y decidir qué hacer con ellas.<br />
Una persona con buena gestión emocional puede tener miedo de hablar en público y aun así hablar bien; puede estar frustrada con un compañero de equipo y aun así sostener la conversación difícil sin gritar. La emoción no desaparece; lo que cambia es la respuesta que damos.</p>
</section>

<h2 id="edison-y-las-10000-formas-que-no-funcionan">Edison y las 10.000 formas que no funcionan</h2>
<p>Cuando un periodista preguntó a Thomas Edison cómo se sentía después de miles de intentos fallidos antes de dar con un filamento de bombilla duradero, su respuesta entró en la historia: «No he fracasado. He encontrado 10.000 formas que no funcionan» . Lo interesante no es el ingenio de la frase, sino la mentalidad que describe: cada intento fallido no es una derrota, es un dato que reduce el universo de soluciones posibles. Edison no era especialmente más listo que sus competidores; lo que tenía era una tolerancia altísima a los resultados negativos, porque los entendía como información, no como veredicto.</p>

<h2 id="carol-dweck-la-mentalidad-de-crecimiento">Carol Dweck: la mentalidad de crecimiento</h2>
<p>Si hubiera que quedarse con una sola idea de toda esta unidad, sería la de Carol Dweck , psicóloga de la Universidad de Stanford. A lo largo de tres décadas de investigación (de 1988 a 2017, con miles de niños, adolescentes y adultos estudiados), Dweck identificó dos formas opuestas de entender la inteligencia y las capacidades personales. La diferencia entre las dos predice, en bastantes estudios, más cosas que el cociente intelectual.</p>
<h3 id="mentalidad-fija">Mentalidad fija</h3>
<p>La mentalidad fija ( fixed mindset ) cree que las capacidades —la inteligencia, el talento, las habilidades sociales— son rasgos fijos . Se nace con cierta cantidad y eso es lo que hay para toda la vida. Quien tiene mentalidad fija interpreta cada resultado como una prueba sobre quién es:</p>
<ul>
<li>Si aprueba un examen difícil: «soy listo» .</li>
<li>Si lo suspende: «no valgo para esto» .</li>
<li>Si tiene que esforzarse mucho para entender algo: «si tuviera que esforzarme tanto es que no soy bueno; los que valen lo pillan a la primera» .<br />
La mentalidad fija lleva a evitar retos donde se pueda fallar, a abandonar pronto cuando algo cuesta y a sentirse amenazado por el éxito de los demás (porque, si todos pueden, mi mérito vale menos).</li>
</ul>
<h3 id="mentalidad-de-crecimiento">Mentalidad de crecimiento</h3>
<p>La mentalidad de crecimiento ( growth mindset ) cree que las capacidades son como un músculo: se entrenan, se desarrollan, mejoran con la práctica deliberada. Quien tiene mentalidad de crecimiento interpreta los resultados como información sobre dónde está ahora , no sobre quién es para siempre:</p>
<ul>
<li>Si aprueba: «he conseguido entenderlo, lo que hice funcionó» .</li>
<li>Si suspende: «todavía no lo domino, ¿qué tengo que cambiar para la próxima?» .</li>
<li>Si tiene que esforzarse: «claro, así es como se aprende lo difícil» .<br />
Esta mentalidad lleva a buscar retos, a persistir cuando cuesta y a ver el éxito de los demás como inspiración o referencia, no como amenaza.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-class="curiosity" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" class="curiosity" data-marpit-pagination="14" style="--paginate:true;--class:curiosity;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h2 id="nota-1">NOTA</h2>
<p>La diferencia entre las dos mentalidades cabe en una palabra: todavía . «No sé hacer esto» es mentalidad fija. «No sé hacer esto todavía» es mentalidad de crecimiento. La misma realidad —no saber algo ahora mismo— se interpreta como veredicto o como punto de partida. Dweck demostró en escuelas de Chicago que enseñar a los alumnos a añadir esta palabra a sus frases internas mejoraba las notas en un curso entero.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h3 id="por-qu%C3%A9-importa-para-emprender">Por qué importa para emprender</h3>
<p>Emprender es, en buena parte, hacer cosas que aún no sabes hacer. Cuando montas tu primer proyecto, no sabes hacer un presupuesto realista, no sabes negociar con un proveedor, no sabes cerrar una venta. Con mentalidad fija cada uno de esos primeros intentos confirma que no vales ; con mentalidad de crecimiento cada uno de esos intentos te enseña algo concreto para el siguiente. Quien emprende con mentalidad fija abandona en el tercer tropiezo; quien lo hace con mentalidad de crecimiento llega a la décima iteración, donde normalmente está la versión que funciona.<br />
La mentalidad no es un rasgo del que se nace: se aprende y se reaprende toda la vida. La misma persona puede tener mentalidad de crecimiento en una asignatura y mentalidad fija en otra ( «para inglés no valgo» ). Detectarlo es el primer paso para cambiarlo.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h2 id="c%C3%B3mo-se-entrena-la-creatividad-dos-t%C3%A9cnicas-concretas">Cómo se entrena la creatividad: dos técnicas concretas</h2>
<p>La creatividad parece magia hasta que se descompone en técnicas. Las dos más usadas en empresas, agencias de diseño y aulas de emprendimiento son el brainstorming y SCAMPER . Las dos sirven para lo mismo —generar muchas ideas en poco tiempo— pero funcionan distinto.</p>
<h3 id="brainstorming-las-tres-reglas-que-casi-nadie-respeta">Brainstorming: las tres reglas que casi nadie respeta</h3>
<p>El brainstorming (lluvia de ideas) lo inventó el publicista Alex Osborn en 1953. La idea es muy simple: reunir a un grupo y generar tantas ideas como sea posible sobre una pregunta concreta, durante un tiempo limitado. Lo que casi todo el mundo hace mal es saltarse las tres reglas que hacen que funcione:</p>
<ul>
<li>Cantidad sobre calidad. El objetivo es producir muchas ideas, no buenas ideas. Las buenas ideas, si aparecen, vendrán después , en la fase de selección. Durante la generación hay que escribir todo: lo brillante, lo absurdo, lo evidente y lo que parece una tontería.</li>
<li>Sin críticas. Mientras se generan ideas, está prohibido decir «eso no funcionaría porque…» . Las críticas matan la velocidad y hacen que la gente se autocensure. Hay tiempo para criticar al final; durante el brainstorming, no.</li>
<li>Construir sobre las ideas de otros. Si alguien dice algo, los demás pueden mejorarlo, combinarlo con otra idea o llevarlo en otra dirección. La idea final suele ser de todos, no de una sola persona.<br />
En la práctica, un brainstorming de 20 minutos bien hecho produce entre 40 y 100 ideas. La mayoría serán inútiles; tres o cuatro merecerán la pena, y eso es exactamente lo que se buscaba.</li>
</ul>
<h3 id="scamper-siete-preguntas-para-transformar-algo-que-ya-existe">SCAMPER: siete preguntas para transformar algo que ya existe</h3>
<p>Cuando el brainstorming en blanco no fluye, SCAMPER es una alternativa más estructurada. Lo desarrolló Bob Eberle en los años setenta como herramienta educativa, y consiste en aplicar siete preguntas a un producto, servicio o proceso que ya existe. Cada letra es una pregunta:</p>
<ul>
<li>S ustituir: ¿qué componente puedo cambiar por otro?</li>
<li>C ombinar: ¿qué puedo unir con esto que ahora va por separado?</li>
<li>A daptar: ¿qué de otro contexto puedo traer aquí?</li>
<li>M odificar: ¿qué puedo hacer más grande, más pequeño, de otro color, con otra forma?</li>
<li>P oner otros usos: ¿para qué más podría servir esto?</li>
<li>E liminar: ¿qué puedo quitar y que siga funcionando?</li>
<li>R eorganizar: ¿qué orden o disposición puedo cambiar?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-class="exercise" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" class="exercise" data-marpit-pagination="17" style="--paginate:true;--class:exercise;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32"><p class="exercise__kicker">PROCEDIMIENTO</p>
## Pasos
<ol class="exercise__steps">
  <li>Sustituir. Cambiar el tejido habitual por uno reciclado de botellas PET, o cambiar las cremalleras por cierres magnéticos. ¿Aporta valor? ¿Encarece mucho?</li>
  <li>Combinar. Mochila + cargador solar incorporado en la solapa superior. Mochila + soporte rígido que se despliega y hace de asiento plegable para esperar el autobús.</li>
  <li>Adaptar. Llevar a la mochila escolar elementos de la mochila de senderismo: cinturón lumbar para distribuir peso, bolsillo de hidratación para botella. ¿Qué pasa si una mochila de 15 años pesa demasiado a lo largo del curso?</li>
  <li>Modificar. Mochila modular en la que cada compartimento se separa y se lleva por separado en clases de gimnasia. Mochila con compartimentos transparentes para encontrar las cosas sin abrir todo.</li>
  <li>Poner otros usos. La misma mochila convertida en bolsa de viaje de fin de semana, o en bolsa de deporte, o en mochila técnica para una salida de fin de semana. Diseño multipropósito.</li>
  <li>Eliminar. ¿Y si quitamos las asas superiores que casi nadie usa? ¿Y si quitamos los bolsillos laterales y dejamos un único compartimento? Mochila minimalista.</li>
  <li>Reorganizar. En lugar de abrir por arriba, abrir por delante como una maleta, para ver todo el contenido sin sacarlo. O acceder al compartimento del portátil por la espalda, no por arriba.</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<p>Aplicando SCAMPER veinte minutos a la mochila escolar, un equipo de 4 personas genera fácilmente 20-30 ideas. La mayoría no llegará a ningún sitio; una o dos pueden ser la base de un proyecto viable.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-class="exercise" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" class="exercise" data-marpit-pagination="19" style="--paginate:true;--class:exercise;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32"><p class="exercise__kicker">ENUNCIADO</p>
## Aplica SCAMPER a un objeto cotidiano y elige la mejor idea
<p>Enunciado Coge un objeto que todo el mundo conozca: el estuche escolar . Aplica las siete preguntas de SCAMPER para generar al menos una idea por letra. Después, elige la idea que te parezca más prometedora y justifica por qué, usando dos criterios sencillos: ¿resuelve una molestia real? y ¿se podría hacer sin un presupuesto enorme?</p>
</section>

## Aplica SCAMPER a un objeto cotidiano y elige la mejor idea
<p>Solución paso a paso S — Sustituir : cambiar la tela por un material lavable y antimanchas; cambiar la cremallera por velcro silencioso para no molestar en clase. C — Combinar : estuche + cargador de móvil pequeño; estuche + soporte que se despliega y sujeta el móvil para ver vídeos mientras estudias. A — Adaptar : traer del mundo del maquillaje la idea de compartimentos elásticos para que cada boli tenga su sitio y no se mezcle todo. M — Modificar : hacerlo transparente para ver lo que hay dentro sin abrirlo; hacerlo plano para que quepa dentro de un libro. P — Poner otros usos : que el mismo estuche sirva de neceser pequeño para una excursión de un día. E — Eliminar : quitar la cremallera entera y dejar una funda enrollable que se ata con una goma. Menos piezas que se rompen. R — Reorganizar : que se abra del todo en horizontal y se quede de pie sobre la mesa, como un organizador, en vez de tener que vaciarlo. Elección y justificación La idea más prometedora es la del paso 7 ( estuche que se abre y se queda de pie sobre la mesa ). Cumple los dos criterios: resuelve una molestia real (perder tiempo rebuscando dentro del estuche en mitad de un examen) y se puede prototipar barato con un estuche normal y un par de cartones que le den rigidez. La idea del cargador integrado (paso 2) suena llamativa pero encarece mucho el producto y añade el problema de la batería, así que la descartamos en esta fase. Trampa habitual : querer quedarse con la idea más "espectacular" en lugar de la más útil y barata. En creatividad aplicada al emprendimiento, gana casi siempre la idea sencilla que resuelve algo concreto.</p>
</section>

<h2 id="el-fracaso-como-aprendizaje">El fracaso como aprendizaje</h2>
<p>Aquí llegamos a la parte más difícil de toda la unidad. La narrativa popular dice «fracasa rápido, fracasa a menudo» como si fracasar fuera bueno en sí mismo. No lo es: fracasar duele, cuesta dinero, agota emocionalmente y, en la versión grave, puede dejar deudas durante años. Pero también es estadísticamente probable cuando se emprende. La pregunta no es cómo evitarlo —no se puede del todo— sino cómo gestionarlo para que el coste sea bajo y el aprendizaje alto.</p>
<h3 id="tres-estrategias-concretas-para-no-quedarse-bloqueado">Tres estrategias concretas para no quedarse bloqueado</h3>
<ul>
<li>Separar la persona del proyecto. Si un proyecto fracasa, lo que ha fallado es el proyecto , no la persona que lo intentó. Esta distinción suena obvia y se olvida en cuanto duele. La mentalidad de crecimiento de Dweck ayuda exactamente aquí: el resultado es información sobre el intento, no veredicto sobre quien lo intentó.</li>
<li>Hacer un post-mortem honesto. Cuando algo no funciona, sentarse —solo o con el equipo— y responder por escrito a tres preguntas: ¿qué esperábamos que pasara?, ¿qué pasó realmente?, ¿qué haríamos distinto la próxima vez? Sin esa revisión, el fracaso solo deja una sensación vaga de derrota. Con ella, deja conocimiento utilizable.</li>
<li>Reducir el coste del próximo intento. En lugar de jugarse todo a una sola apuesta grande, hacer pruebas pequeñas y baratas que se puedan repetir varias veces. Esto es lo que la metodología Lean Startup llama experimentos de validación ; lo veremos en la Unidad 10. La regla es simple: si fallar una vez te deja fuera de juego, la apuesta es demasiado grande.</li>
</ul>
</section>

<h2 id="ejemplo-real">Ejemplo real</h2>
<div class="example__body">Sara Blakely fundó Spanx en 1998 con 5.000 dólares ahorrados vendiendo faxes puerta a puerta. En 2012 se convirtió en la mujer más joven hecha a sí misma en alcanzar los mil millones de dólares de patrimonio. Cuando le preguntan qué le permitió persistir cuando todas las fábricas le decían «no» , siempre cuenta lo mismo: en su casa, su padre les preguntaba cada noche a ella y a su hermano «¿en qué habéis fracasado hoy?» . Si no tenían nada que contar, se enfadaba. Si contaban algún intento fallido, lo celebraban. La consecuencia: Blakely creció entendiendo que no intentar es el verdadero fracaso , no equivocarse intentando. Esa educación temprana, dice, fue lo que más le sirvió cuando años después oía cien «no» seguidos sin abandonar.</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h3 id="resiliencia-el-m%C3%BAsculo-de-seguir-adelante">Resiliencia: el músculo de seguir adelante</h3>
<p>La resiliencia es la capacidad de recuperarse tras un golpe y seguir adelante. No es no caerse —caerse es inevitable—; es levantarse sin perder demasiado tiempo y aprender algo del trompazo. Como las habilidades anteriores, se entrena: cada pequeño fracaso bien gestionado (un examen suspendido, una entrevista no superada, una propuesta de proyecto rechazada) construye un poco más de músculo para los grandes.<br />
Tres cosas ayudan a desarrollarla: tener una red de apoyo (familia, amigos, compañeros) con la que poder hablar sin filtro, mantener rutinas mínimas (sueño, ejercicio, comida) cuando todo lo demás se desordena, y darse permiso para sentir mal antes de pasar a la fase de análisis. Saltarse el sentimiento y pasar directamente al «bueno, ¿qué aprendemos?» suele acabar mal: la emoción no procesada vuelve por otra puerta.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h2 id="conexi%C3%B3n-con-el-proyecto-capstone">Conexión con el proyecto capstone</h2>
<p>Esta unidad aporta dos entregables al proyecto capstone:</p>
<ul>
<li>Diagnóstico de habilidades del equipo. Cada equipo identifica, de las seis habilidades vistas, las dos en las que es más fuerte y las dos en las que necesita crecer. Sobre las debilidades se plantea un plan mínimo de mejora durante el curso.</li>
<li>Primera sesión de creatividad sobre la idea inicial. Aplicando brainstorming durante 20 minutos y SCAMPER durante otros 20, cada equipo expande su idea inicial de la Unidad 1 hasta tener una versión más concreta y al menos dos variantes alternativas.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h2 id="glosario">Glosario</h2>
<ul>
<li>Comunicación efectiva : lograr que quien te escucha entienda exactamente lo que quieres decir y recuerde lo importante. No es hablar mucho ni usar palabras difíciles.</li>
<li>Escucha activa : prestar atención completa, reformular con tus palabras lo que la otra persona ha dicho y preguntar lo que no queda claro, en vez de esperar tu turno para hablar.</li>
<li>Trabajo en equipo : producir un buen resultado conjunto aunque haya diferencias, con roles claros, reglas de comunicación y una forma acordada de resolver conflictos.</li>
<li>Pensamiento divergente : generar muchas respuestas posibles a una pregunta, incluso las que parecen absurdas. Es lo contrario del examen tipo test, donde solo hay una correcta.</li>
<li>Pensamiento crítico : revisar las ideas, propias y ajenas, antes de actuar; preguntarse si están apoyadas en datos o solo en intuición.</li>
<li>Gestión emocional : reconocer lo que sientes, ponerle nombre y decidir qué haces con ello. No es no sentir miedo, sino actuar bien aun sintiéndolo.</li>
<li>Brainstorming : técnica para generar muchas ideas en grupo y en poco tiempo, con tres reglas: cantidad sobre calidad, sin críticas y construir sobre las ideas de los demás.</li>
<li>SCAMPER : técnica de creatividad con siete preguntas (Sustituir, Combinar, Adaptar, Modificar, Poner otros usos, Eliminar, Reorganizar) para transformar algo que ya existe.</li>
<li>Mentalidad fija : creencia de que la inteligencia y el talento son fijos, con los que se nace. Lleva a evitar retos por miedo a fallar.</li>
<li>Mentalidad de crecimiento : creencia de que las capacidades se entrenan como un músculo. La diferencia cabe en una palabra: todavía .</li>
<li>Resiliencia : capacidad de recuperarse tras un golpe y seguir adelante aprendiendo algo del trompazo.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h2 id="para-profundizar">Para profundizar</h2>
<p>Recursos accesibles para entrenar estas habilidades fuera del libro:</p>
<ul>
<li>El poder de creer que puedes mejorar — charla TED de Carol Dweck (subtítulos en español, 10 min). Por qué encaja: la propia autora explica la mentalidad de crecimiento con ejemplos de instituto. Imprescindible tras esta unidad.</li>
<li>Mindset: la nueva psicología del éxito — Carol Dweck (Sirio, 2017). Por qué encaja: el libro completo, escrito para público general, con muchos casos de estudiantes y deportistas.</li>
<li>El secreto de Spanx — charla y entrevistas de Sara Blakely sobre el fracaso (busca &quot;Sara Blakely failure&quot; con subtítulos). Por qué encaja: cuenta en primera persona cómo su familia celebraba los fracasos, justo el tema de esta unidad.</li>
<li>Vídeos de creatividad del canal CrashCourse o AsapSCIENCE (subtítulos en español). Por qué encaja: explican el pensamiento divergente y cómo funciona el cerebro creativo en pocos minutos y con animaciones.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32">
<h2 id="preguntas-para-reflexionar">Preguntas para reflexionar</h2>
<p>Estas preguntas no tienen una respuesta única. Sirven para debatir en clase o pensar a solas:</p>
<ul>
<li>¿En qué asignatura tienes mentalidad de crecimiento y en cuál tienes mentalidad fija? ¿Qué frase te dices a ti mismo en cada una?</li>
<li>Recuerda el último trabajo en grupo que hiciste. ¿Estaban claros los roles desde el principio? Si no, ¿qué pasó cuando apareció el primer desacuerdo?</li>
<li>¿Qué fue lo último que intentaste y te salió mal? Si tu familia te preguntara &quot;¿en qué has fracasado hoy?&quot; como la de Sara Blakely, ¿qué responderías esta semana?</li>
</ul>

<div class="caso__body">
  <p class="caso__kicker">VUELVE AL CASO</p>
  <p class="caso__body-text">La explicación que ella misma daba en entrevistas no era talento innato. Era disciplina de aprendizaje continuo : estudiar sola, viajar a ver otras cocinas, copiar lo bueno y descartar lo que no funcionaba en su carta. La habilidad central no era cocinar (eso lo aprendió en el proceso); era mantenerse aprendiendo durante 30 años sin descanso . Aplica al aula: la habilidad emprendedora más infravalorada no es la creatividad ni el carisma; es la constancia para aprender lo que aún no sabes hacer . Quien la tiene puede llegar a cualquier sitio sin partir con ventaja.</p>

<h2 id="lo-esencial-de-la-unidad-2">Lo esencial de la Unidad 2</h2>
<ul>
<li>Las habilidades emprendedoras se entrenan , no se heredan. La mentalidad de crecimiento de Dweck demuestra que añadir la palabra todavía cambia cómo interpretamos cada resultado.</li>
<li>Las tres habilidades sociales clave son comunicación efectiva, escucha activa (no callarse mientras pensamos la respuesta) y trabajo en equipo con roles definidos.</li>
<li>Las tres habilidades cognitivas clave son creatividad, pensamiento crítico y gestión emocional. La creatividad se entrena con técnicas como brainstorming (cantidad, sin críticas, construir sobre las ideas de otros) y SCAMPER (siete preguntas para transformar lo que ya existe).</li>
<li>El fracaso duele y tiene costes reales, pero es estadísticamente probable al emprender. La diferencia la marcan tres estrategias: separar persona y proyecto, hacer post-mortem honesto y reducir el coste del próximo intento.</li>
<li>La resiliencia es el músculo que se entrena con cada pequeño tropiezo bien gestionado: con red de apoyo, rutinas mínimas y permiso para sentirse mal antes de analizar.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-class="mirar-fora" data-theme="7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl" lang="en-US" class="mirar-fora" data-marpit-pagination="31" style="--paginate:true;--class:mirar-fora;--theme:7wj0blg8lfi3v3psk8yoz6n14vkhxic8a40724pjl;" data-marpit-pagination-total="32"><div class="mf__cell">
  <div class="mf__icon">§</div>
  <div class="mf__type">Leer</div>
  <div class="mf__title">La psicología del dinero</div>
  <div class="mf__author">Morgan Housel · Planeta, 2021</div>
  <div class="mf__desc">No va de cocina ni de habilidades sociales, pero sí del rasgo que esta unidad subraya: la disciplina sostenida en el tiempo vale más que el talento puntual. Veinte historias cortas sobre por qué unas personas avanzan y otras no.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">▶</div>
  <div class="mf__type">Ver</div>
  <div class="mf__title">Grit: el poder de la pasión y la perseverancia</div>
  <div class="mf__author">Angela Duckworth · TED Talk · ~6 min</div>
  <div class="mf__desc">La psicóloga que estudió por qué unas personas terminan lo que empiezan y otras no. Cierra exactamente la idea de Ruscalleda: el talento existe, pero sin constancia no acaba en ningún sitio.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">@</div>
  <div class="mf__type">Seguir</div>
  <div class="mf__title">@joantubau</div>
  <div class="mf__author">X / Twitter</div>
  <div class="mf__desc">Periodista y divulgador catalán que escribe sobre hábitos, atención y aprendizaje sostenido. Hilos cortos y útiles para entender por qué la constancia es una habilidad entrenable.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">✎</div>
  <div class="mf__type">Hacer</div>
  <div class="mf__title">Tres habilidades, un plan de un mes</div>
  <div class="mf__author">30-40 min</div>
  <div class="mf__desc">Identifica tres habilidades de esta unidad que crees que necesitas mejorar (por ejemplo: hablar en público, escuchar sin interrumpir, no abandonar al primer revés). Para cada una, escribe una acción concreta que harás cada semana durante un mes para entrenarla. Tiene que ser tan pequeña que no te dé pereza empezar. En parejas, revisión cruzada del plan : cada uno lee el plan de su compañero y pregunta dos cosas: ¿es lo bastante pequeño para hacerlo cada semana? ¿cómo sabrás que lo has cumplido? Ajustar el plan según el feedback. Duración: 30 min. Materiales: papel y bolígrafo.</div>
</div>
</section>
