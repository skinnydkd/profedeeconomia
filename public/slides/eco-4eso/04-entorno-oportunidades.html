<h1 id="el-entorno-detectar-oportunidades">El entorno: detectar oportunidades</h1>
<p>Las oportunidades de emprender no caen del cielo: están en la calle, en la conversación del bar, en la queja recurrente del grupo de WhatsApp. Hace falta mirar con método. Esta unidad enseña a hacerlo.</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-class="tldr" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" class="tldr" data-marpit-pagination="2" style="--paginate:true;--class:tldr;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31"><p class="tldr__kicker">TL;DR</p>
<p class="pullquote">Las oportunidades de emprendimiento no caen del cielo . Surgen de cambios en el entorno (tecnología, sociedad, economía, regulación) que dejan huecos sin cubrir. En esta unidad aprendemos a detectarlas con herramientas simples como PESTEL y a distinguir una necesidad real de un simple deseo.</p>
</section>

  <p class="caso__kicker">CASO REAL</p>
  <h2>Una plataforma de cine compite con Netflix encontrando lo que Netflix no quería</h2>
  <p class="caso__body-text">Filmin es una plataforma de cine y series española fundada en 2007 por Jaume Ripoll, Juan Carlos Tous y otros socios. Cuando empezaron, Netflix ya existía en Estados Unidos y arrasaba; intentar copiarla habría sido suicida. En vez de eso, encontraron un hueco : cine de autor, en versión original, festivales europeos, documentales que las grandes plataformas no priorizaban. Hoy tienen más de 600.000 suscriptores y han sobrevivido al desembarco de Netflix, HBO, Disney+ y Amazon Prime en España.</p>
  <p class="caso__pregunta">¿Cómo se detecta una oportunidad que las gigantes no ven?</p>
  <p class="caso__fuente">Adaptado de notas de prensa de Filmin · 2007-2024</p>

<h2 id="objetivos-de-la-unidad">Objetivos de la unidad</h2>
<ul>
<li>Aplicar un análisis PESTEL simplificado (Político, Económico, Social, Tecnológico, Ecológico, Legal) a un entorno conocido como el barrio o el instituto.</li>
<li>Distinguir con claridad entre necesidad, problema y oportunidad emprendedora.</li>
<li>Identificar cinco tendencias contemporáneas con potencial emprendedor en España.</li>
<li>Aplicar la técnica del &quot;diario de molestias&quot; durante una semana para detectar oportunidades reales.</li>
<li>Construir un mapa de empatía simplificado de un usuario potencial.</li>
</ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h2 id="el-entorno-el-contexto-que-rodea-cualquier-proyecto">El entorno: el contexto que rodea cualquier proyecto</h2>
<p>El entorno general —también llamado macroentorno — es el conjunto de fuerzas amplias que afectan a todas las personas y empresas de un territorio: la política, la economía, los valores sociales, la tecnología disponible, el clima y las leyes. Ninguna de estas fuerzas se puede cambiar individualmente, pero todas condicionan qué proyectos tienen sentido emprender hoy y cuáles no.<br />
Pongamos un ejemplo cercano. Imagina que quieres abrir una tienda de alquiler de DVD en 2026. Por mucho talento que tengas, el entorno te dice claramente que es mal momento: la tecnología (streaming) y el comportamiento social (consumo digital) han matado el sector. En cambio, abrir un servicio de reparación de bicicletas eléctricas en una capital de provincia tiene viento a favor: hay más bicis eléctricas cada año (tendencia social), pocas tiendas saben repararlas (oportunidad) y existen ayudas públicas a la movilidad sostenible (factor político-legal).<br />
Aprender a leer el entorno antes de invertir tiempo o dinero en una idea es probablemente la habilidad más rentable del emprendedor.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h2 id="pestel-simplificado-seis-ventanas-para-mirar-el-entorno">PESTEL simplificado: seis ventanas para mirar el entorno</h2>
<p>Para no olvidar ninguna dimensión importante, los analistas usan una rejilla con seis letras: PESTEL . Cada letra es una ventana distinta desde la que mirar el contexto. La versión que vamos a usar en 4ºESO está simplificada y adaptada a tu realidad cercana.</p>
<h3 id="p--pol%C3%ADtico">P — Político</h3>
<p>Decisiones de gobiernos (nacional, autonómico, municipal) que cambian las reglas del juego. Ejemplos cercanos:</p>
<ul>
<li>Subvenciones a personas jóvenes emprendedoras (cuota cero de autónomos durante 12 meses para menores de 30).</li>
<li>Plan municipal de peatonalización del centro de tu ciudad: oportunidad para terrazas, problema para aparcamientos privados.</li>
<li>Programa Kit Digital o ayudas NextGenerationEU para digitalización de pequeños negocios.</li>
</ul>
<h3 id="e--econ%C3%B3mico">E — Económico</h3>
<p>Cómo está la economía en general y cómo afecta al bolsillo de la gente:</p>
<ul>
<li>El Euríbor (tipo de interés de referencia de las hipotecas) marca cuánto paga al mes una familia con hipoteca: cuando sube, hay menos dinero disponible para consumo.</li>
<li>Inflación : en 2022 los precios subieron un 8,4 % en España. Si los sueldos no suben igual, la gente compra menos.</li>
<li>Salario mínimo (SMI): 1.221 € al mes en 14 pagas desde el 1 de enero de 2026 (RD 126/2026, BOE 19-2-2026), un +3,1 % respecto a 2025. Determina el suelo del coste laboral en hostelería, comercio y servicios.</li>
</ul>
<h3 id="s--social">S — Social</h3>
<p>Cómo cambia la sociedad: edad de la población, valores, costumbres, hábitos de consumo:</p>
<ul>
<li>Envejecimiento del barrio : si en tu zona la edad media supera los 50 años, hay demanda de farmacia, residencia y acompañamiento; cae la demanda de academia infantil o tienda de juguetes.</li>
<li>Aumento de hogares unipersonales: explica el auge de envases pequeños y de comida preparada para una persona.</li>
<li>Mayor preocupación por la salud mental, especialmente entre adolescentes y jóvenes.</li>
</ul>
<h3 id="t--tecnol%C3%B3gico">T — Tecnológico</h3>
<p>Qué herramientas y tecnologías están al alcance de cualquiera:</p>
<ul>
<li>Inteligencia artificial generativa (ChatGPT, Claude, Midjourney). Permite que una persona sola haga lo que antes requería un equipo de cinco.</li>
<li>Plataformas de comercio electrónico (Shopify, Etsy, Wallapop Pro) que reducen a cero la barrera de entrada para vender online.</li>
<li>Pagos instantáneos (Bizum) y fintech (Revolut, N26) que han cambiado los hábitos de pago de toda una generación.</li>
</ul>
<h3 id="e--ecol%C3%B3gico">E — Ecológico</h3>
<p>Clima, recursos naturales, sostenibilidad:</p>
<ul>
<li>Sequía en Andalucía y Levante : oportunidad para sistemas de riego eficiente, recogida de agua de lluvia, jardinería xerófila (con plantas resistentes a la sequía).</li>
<li>Aumento de temperaturas en verano: demanda creciente de toldos, aire acondicionado eficiente, refugios climáticos urbanos.</li>
<li>Reciclaje y economía circular: nuevos negocios alrededor del segundo uso (Wallapop, Vinted, talleres de reparación).</li>
</ul>
<h3 id="l--legal">L — Legal</h3>
<p>Leyes y normas que conviene conocer antes de empezar:</p>
<ul>
<li>Edad mínima para ser autónomo en España : 16 años con autorización de padre/madre/tutor; 18 años sin autorización (Ley 20/2007 del Estatuto del Trabajo Autónomo).</li>
<li>Reglamento europeo de protección de datos (RGPD) para cualquier negocio que recopile correos o datos personales.</li>
<li>Normativa local (ordenanzas municipales) sobre terrazas, ruido, horarios comerciales o licencias de actividad.</li>
</ul>
</section>

<h2 id="nota">NOTA</h2>
<p>PESTEL es una rejilla de seis ventanas (Política, Económica, Social, Tecnológica, Ecológica, Legal) que se usa para mapear el entorno general de un proyecto. La versión simplificada de 4ºESO no busca un informe exhaustivo, sino entrenar la mirada: ante cualquier idea de negocio, recorrer mentalmente las seis ventanas y preguntarse si hay alguna fuerza grande a favor o en contra.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h3 id="pestel-aplicado-abrir-un-bar-en-mi-barrio">PESTEL aplicado: abrir un bar en mi barrio</h3>
<p>Un PESTEL no es un examen de memoria: es una secuencia de preguntas. Veamos cómo se aplica a una idea concreta —abrir un bar de tapas en tu barrio— siguiendo los pasos en orden.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<p>Si en cualquiera de los seis pasos detectas una luz roja —por ejemplo, el ayuntamiento ha cerrado licencias nuevas en esa calle—, mejor saberlo en la primera semana de análisis que tras firmar el contrato de alquiler.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h2 id="necesidad-problema-y-oportunidad-tres-cosas-distintas">Necesidad, problema y oportunidad: tres cosas distintas</h2>
<p>El error más común al empezar a emprender es confundir tres conceptos que se parecen pero no son lo mismo. Conviene distinguirlos con cuidado.<br />
Una necesidad es algo que las personas requieren para vivir o funcionar: comer, desplazarse, comunicarse, descansar. Las necesidades son universales y no cambian apenas con el tiempo.<br />
Un problema es una dificultad concreta que aparece al intentar cubrir esa necesidad en un contexto determinado. Los problemas sí cambian con el tiempo, la geografía y la tecnología.<br />
Una oportunidad es una manera nueva, mejor o más barata de resolver ese problema. No toda necesidad genera problema (si está bien cubierta no hay queja), y no todo problema genera oportunidad (si no hay forma viable de solucionarlo). La oportunidad aparece solo cuando convergen una necesidad real, un problema mal resuelto y una solución técnicamente posible.</p>
</section>

<p>Veámoslo con un caso único:</p>
<ul>
<li>Necesidad universal : desplazarse por la ciudad para ir al trabajo, al instituto o al supermercado.</li>
<li>Problema actual en muchas ciudades españolas : atascos en hora punta, contaminación, aparcamiento imposible, precio alto del taxi y del transporte privado.</li>
<li>Oportunidades que han aparecido : BlaBlaCar (compartir coche entre ciudades), Cabify y Uber (alternativa al taxi), Bicimad/Valenbisi (bicicleta pública), patinete eléctrico de alquiler, carsharing por minutos. Cada una resuelve una parte distinta del problema y todas conviven.<br />
La regla práctica para no equivocarse: antes de hablar de oportunidad, describe la necesidad y el problema con frases completas . Si no eres capaz de hacerlo, no tienes una oportunidad, tienes una intuición.</li>
</ul>

<h2 id="airbnb-empez%C3%B3-con-la-necesidad-propia-de-pagar-el-alquiler">Airbnb empezó con la necesidad propia de pagar el alquiler</h2>
<p>En octubre de 2007, Brian Chesky y Joe Gebbia compartían piso en San Francisco y no llegaban a pagar el alquiler de aquel mes. Ese fin de semana coincidía un congreso de diseño en la ciudad y los hoteles estaban llenos: alquilaron tres colchones hinchables en su salón a 80 dólares la noche. La idea no salió de un brainstorming corporativo ni de un estudio de mercado, sino de su propia necesidad de pagar el alquiler. Hoy Airbnb cotiza en bolsa por encima de los 85.000 millones de dólares (NASDAQ, primavera 2026). La moraleja, citada cien veces por inversores de Silicon Valley: las mejores ideas suelen empezar siendo soluciones a un problema propio. (El detalle completo del MVP de Airbnb se cuenta en la Unit 9.)</p>
</section>

<h2 id="cinco-tendencias-contempor%C3%A1neas-con-potencial-emprendedor-2024-2026">Cinco tendencias contemporáneas con potencial emprendedor (2024-2026)</h2>
<p>Las tendencias son cambios de fondo —no modas pasajeras— que afectan a millones de personas a la vez y abren ventanas de oportunidad durante varios años. A continuación, cinco tendencias que están definiendo el mapa emprendedor en España.</p>
<h3 id="1-digitalizaci%C3%B3n-e-inteligencia-artificial">1. Digitalización e inteligencia artificial</h3>
<p>La irrupción de la IA generativa desde finales de 2022 (ChatGPT) ha cambiado la productividad de cualquier oficio creativo o administrativo. Fintech como Revolut, N26 o Bizum han redefinido el pago. Oportunidades concretas: consultoría de IA para pymes locales, automatización de tareas para autónomos, formación para perfiles no técnicos.</p>
<h3 id="2-transici%C3%B3n-ecol%C3%B3gica">2. Transición ecológica</h3>
<p>La instalación de energía solar fotovoltaica en hogares ha crecido un 300 % en España entre 2020 y 2024. La alimentación plant-based (hamburguesas vegetales, leches de avena) gana cuota en supermercados. La regulación europea empuja a empresas y particulares hacia menores emisiones. Oportunidades: instalación y mantenimiento solar, restauración vegetal/vegana, asesoría energética.</p>
</section>

<h3 id="3-envejecimiento-demogr%C3%A1fico-silver-economy">3. Envejecimiento demográfico: silver economy</h3>
<p>España tiene una de las pirámides demográficas más envejecidas de Europa. En 2025 hay más de 9,5 millones de personas mayores de 65 años (INE, Padrón Continuo). Esto abre un sector entero, la silver economy : residencias, teleasistencia, ocio sénior, productos adaptados, formación digital para mayores, acompañamiento a domicilio.</p>

<h3 id="4-salud-mental-y-bienestar">4. Salud mental y bienestar</h3>
<p>La pandemia disparó la conciencia colectiva sobre salud mental, especialmente entre adolescentes y jóvenes. El sector ha crecido con apps de meditación (Calm, Petit BamBou), terapia psicológica online (TherapyChat, Mind), programas de mindfulness en empresas y formación emocional para colegios.</p>
<h3 id="5-trabajo-flexible-remoto-y-freelance">5. Trabajo flexible: remoto y freelance</h3>
<p>El teletrabajo en España pasó del 4,8 % al 13,5 % entre 2019 y 2023 (EPA, INE). Han aparecido coworkings en pueblos pequeños, plataformas para freelancers (Malt, Fiverr, Upwork) y servicios pensados para nómadas digitales. Oportunidades: alquiler vacacional para teletrabajo, mobiliario ergonómico, gestión administrativa para autónomos digitales.</p>

<div class="example__body">Agustín Gómez y Gerard Olivé crearon Wallapop en Barcelona en 2013 al detectar un problema cotidiano: vender ropa, libros o muebles usados era un infierno burocrático en eBay, lleno de fotos malas, comisiones altas y desconfianza entre extraños. Su solución partió de cero principios: foto desde el móvil, geolocalización ("véndelo a alguien de tu barrio"), chat dentro de la app, cero comisión inicial. La necesidad ya existía (dar salida a cosas usadas), el problema estaba mal resuelto (plataformas existentes eran complicadas) y la tecnología (smartphone con GPS y cámara, ya en manos de millones de personas) hacía viable la solución. A comienzos de 2026 Wallapop superó los 23 millones de usuarios y, ese mismo año, el gigante coreano Naver cerró la compra del 100 % de la empresa por 600 millones de euros , convirtiendo Barcelona en su base europea. No inventaron la necesidad: detectaron antes que nadie que el smartphone permitía resolverla de forma radicalmente más simple.</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h2 id="detectar-oportunidades-en-tu-vida-el-diario-de-molestias">Detectar oportunidades en tu vida: el diario de molestias</h2>
<p>Las oportunidades de emprender se aprenden a ver con la práctica. La técnica más simple y eficaz para entrenar la mirada se llama diario de molestias y consiste en lo siguiente: durante una semana, anota cada vez que algo te molesta —a ti o a alguien que veas— en cualquier actividad cotidiana. Cada molestia es una posible oportunidad esperando a alguien que la resuelva.<br />
La técnica viene de la observación etnográfica , un método de antropología que se usa también en design thinking : en lugar de preguntar a la gente qué quiere (responden mal porque idealizan), se la observa en su comportamiento real (revela lo que de verdad necesita).</p>
<h3 id="plantilla-del-diario-de-molestias">Plantilla del diario de molestias</h3>
<p>| Día | Situación | Qué molestó | Quién se molestó | Posible solución | |---|---|---|---|---| | Lunes | Esperando el bus línea 4 a las 8:00 | Llegaba con 15 min de retraso, sin aviso en la app | Yo y 8 personas más en la parada | Notificación push automática si el bus se retrasa &gt; 5 min | | Martes | Comprando en el supermercado | Cola de 7 personas en caja única; cajeros autoservicio bloqueados | Personas con prisa | Limitar el número de autoservicios cerrados en horas punta | | Miércoles | Estudiando en casa | Mi abuelo no encontraba el botón para subir el volumen del móvil | Mi abuelo, frustrado | App con botones grandes y voz para mayores | | Jueves | ... | ... | ... | ... | | Viernes | ... | ... | ... | ... |<br />
Al final de la semana revisa el listado. No todas las molestias son oportunidades de negocio —algunas son responsabilidad pública, otras técnicamente irresolubles—, pero el 10-20 % suelen tener potencial real . Si repites este ejercicio durante un mes, tendrás entre 5 y 10 ideas con base real, mucho mejor que cualquier brainstorming improvisado en clase.</p>
<blockquote>
<p>Plantilla descargable : tienes una versión imprimible de este diario —con instrucciones, ejemplo y guía de cierre— en /downloads/diario-molestias-eco-4eso.md .</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-class="curiosity" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" class="curiosity" data-marpit-pagination="23" style="--paginate:true;--class:curiosity;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h2 id="nota-1">NOTA</h2>
<p>Mientras escribes el diario, no juzgues si la molestia da para negocio o no. Apúntalo todo. El filtrado se hace al final de la semana con calma. Si filtras a la vez que observas, descartarás cosas que con perspectiva podrían ser oro. Tu trabajo de lunes a viernes es solo observar y anotar .</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h2 id="el-mapa-de-empat%C3%ADa-ponerse-en-los-zapatos-del-usuario">El mapa de empatía: ponerse en los zapatos del usuario</h2>
<p>Una vez detectada una oportunidad, hay que entender bien a quién vamos a ayudar. La herramienta clásica para hacerlo se llama mapa de empatía : cuatro casillas que obligan a describir a la persona usuaria desde su punto de vista, no desde el tuyo.<br />
Las cuatro casillas básicas (versión simplificada) son:</p>
<ul>
<li>¿Qué ve? El entorno visual de la persona: qué le rodea, qué medios consume, qué referentes ve.</li>
<li>¿Qué oye? Lo que escucha de su familia, amistades, redes sociales, jefes, médicos.</li>
<li>¿Qué dice y hace? Su comportamiento observable: qué actitudes toma, qué dice en público, cómo actúa.</li>
<li>¿Qué piensa y siente? Lo más difícil de captar: sus miedos, frustraciones, deseos no expresados, ilusiones.</li>
</ul>
<h3 id="ejemplo-mapa-de-empat%C3%ADa-de-abuelo-de-75-a%C3%B1os-que-quiere-usar-el-m%C3%B3vil">Ejemplo: mapa de empatía de &quot;abuelo de 75 años que quiere usar el móvil&quot;</h3>
<ul>
<li>Ve: un móvil con iconos pequeños, una pantalla brillante difícil de leer al sol, anuncios que aparecen sin que él haga nada, mensajes de WhatsApp de hijos y nietos pidiéndole audios y fotos.</li>
<li>Oye: &quot;abuelo, te lo explico otra vez&quot;, &quot;es que es muy fácil, mira&quot;, &quot;papá, no pulses ahí&quot;, noticias en TV sobre estafas a mayores por teléfono, anuncios de bancos que cierran oficinas y &quot;todo va por la app&quot;.</li>
<li>Dice y hace: suele pedir ayuda a su hija para tareas básicas, evita la banca online por miedo, llama por teléfono en lugar de WhatsApp aunque sabe que sale más caro, deja que el móvil se quede sin batería porque no entiende los avisos.</li>
<li>Piensa y siente: vergüenza por no saber, miedo a que le estafen, frustración por no poder hablar con su médico que ahora &quot;solo atiende por la app&quot;, deseo profundo de comunicarse con los nietos sin depender de nadie.<br />
A partir de este mapa, una oportunidad concreta se ve enseguida: una app de comunicación familiar pensada para mayores , con botones gigantes, audio en lugar de teclado, sin anuncios, con configuración hecha de fábrica por el familiar joven y sin opciones secundarias que confundan. Existen ya algunas (Oscar Senior, GrandPad), pero el mercado en España está lejos de cubrirse.<br />
Hacer un mapa de empatía bien cuesta entre 20 y 40 minutos por perfil. Vale la pena hacer dos o tres antes de invertir tiempo en construir nada.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h2 id="glosario">Glosario</h2>
<ul>
<li>Entorno general (macroentorno) : el conjunto de fuerzas amplias —política, economía, sociedad, tecnología, clima, leyes— que afectan a todos los proyectos de un territorio.</li>
<li>PESTEL : rejilla de seis ventanas (Política, Económica, Social, Tecnológica, Ecológica, Legal) para analizar el entorno general antes de lanzarse con una idea.</li>
<li>Necesidad : algo que las personas requieren para vivir o funcionar (comer, desplazarse, comunicarse). Es universal y casi no cambia con el tiempo.</li>
<li>Problema : la dificultad concreta que aparece al intentar cubrir una necesidad en un sitio y momento determinados. Sí cambia con el tiempo y la tecnología.</li>
<li>Oportunidad : una forma nueva, mejor o más barata de resolver un problema. Solo existe cuando hay necesidad real + problema mal resuelto + solución posible.</li>
<li>Tendencia : cambio de fondo que afecta a millones de personas durante años (no una moda pasajera). Abre ventanas de oportunidad mientras dura.</li>
<li>Silver economy : conjunto de negocios que dan servicio a la población mayor de 65 años (teleasistencia, ocio sénior, productos adaptados…).</li>
<li>Observación etnográfica : método que consiste en mirar a la gente en su comportamiento real en vez de preguntarle qué quiere (porque al preguntar suele idealizar).</li>
<li>Diario de molestias : técnica que consiste en anotar durante una semana todo lo que te molesta, porque cada molestia es una posible oportunidad.</li>
<li>Mapa de empatía : herramienta de cuatro casillas (qué ve, qué oye, qué dice/hace, qué piensa/siente) para entender a una persona usuaria desde su punto de vista.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h2 id="para-profundizar">Para profundizar</h2>
<p>Recursos accesibles para entrenar tu mirada sobre el entorno:</p>
<ul>
<li>¿De dónde vienen las buenas ideas? — charla TED / vídeo animado de Steven Johnson (subtítulos en español). Por qué encaja: explica que las ideas casi nunca son un &quot;¡eureka!&quot; repentino, sino la suma de observaciones a lo largo del tiempo, justo el mensaje de esta unidad.</li>
<li>Documentales y reportajes sobre el origen de Wallapop o Airbnb (busca &quot;cómo nació Wallapop&quot; o &quot;Airbnb story&quot; con subtítulos). Por qué encaja: ves cómo una molestia o una necesidad propia se convirtió en una empresa enorme.</li>
<li>Sección de tendencias de medios como Xataka o El País Tecnología . Por qué encaja: artículos cortos y divulgativos sobre los cambios tecnológicos y sociales que están abriendo oportunidades ahora mismo.</li>
<li>Generación de modelos de negocio (versión visual) — Osterwalder y Pigneur . Por qué encaja: aunque lo veremos a fondo más adelante, sus primeras páginas sobre detectar necesidades del cliente son muy visuales y fáciles de hojear.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31">
<h2 id="preguntas-para-reflexionar">Preguntas para reflexionar</h2>
<p>Estas preguntas no tienen una respuesta única. Sirven para debatir en clase o pensar a solas:</p>
<ul>
<li>Piensa en la última vez que dijiste &quot;qué rabia que no exista algo para esto&quot;. ¿Era una necesidad, un problema o una oportunidad? ¿Alguien podría resolverlo?</li>
<li>De las cinco tendencias de la unidad, ¿cuál crees que afectará más a tu vida o a la de tu familia en los próximos diez años? ¿Por qué?</li>
<li>Si hicieras un diario de molestias esta semana, ¿qué crees que aparecería más veces: cosas del instituto, del transporte, de las apps que usas o de tu barrio?</li>
</ul>
</section>

<div class="caso__body">
  <p class="caso__kicker">VUELVE AL CASO</p>
  <p class="caso__body-text">Filmin no compitió con Netflix; encontró el hueco que Netflix dejaba. Los clientes hipotéticos existían (cinéfilos), tenían un dolor concreto (no encontrar lo que buscaban en las grandes plataformas), pero ninguna gigante les servía bien. Es la lógica del nicho : ser dominante en un segmento pequeño suele ser más rentable que ser irrelevante en uno grande. Aplica al aula: cuando busques oportunidades, no compares tu idea con Netflix o Amazon; pregúntate a quién no atiende bien el gigante y por qué. Ahí está tu hueco.</p>
</div>
</section>

<h2 id="lo-esencial-de-esta-unidad">Lo esencial de esta unidad</h2>
<ul>
<li>PESTEL simplificado = seis ventanas para mirar el entorno general (Política, Económica, Social, Tecnológica, Ecológica, Legal). No es un examen: es un hábito mental antes de lanzarse con una idea.</li>
<li>Necesidad → Problema → Oportunidad son tres conceptos distintos. La oportunidad solo aparece cuando hay necesidad real, problema mal resuelto y solución viable.</li>
<li>Cinco tendencias 2024-2026 marcan el mapa: digitalización/IA, transición ecológica, silver economy , salud mental y trabajo flexible.</li>
<li>El diario de molestias entrena la mirada: una semana anotando todo lo que te molesta detecta más oportunidades reales que cualquier brainstorming improvisado.</li>
<li>El mapa de empatía (qué ve, qué oye, qué dice/hace, qué piensa/siente) obliga a entender al usuario desde su punto de vista, no desde el nuestro.</li>
<li>Las mejores ideas suelen empezar siendo solución a un problema propio (Airbnb) o a una molestia cotidiana bien observada (Wallapop).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-class="mirar-fora" data-theme="4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m" lang="en-US" class="mirar-fora" data-marpit-pagination="30" style="--paginate:true;--class:mirar-fora;--theme:4jgts1gilsjspzdge0o7s9kul0aam7o5oy1sqztx6m;" data-marpit-pagination-total="31"><div class="mf__cell">
  <div class="mf__icon">§</div>
  <div class="mf__type">Leer</div>
  <div class="mf__title">Fifty Things that Made the Modern Economy</div>
  <div class="mf__author">Tim Harford · Riverhead Books, 2017</div>
  <div class="mf__desc">Cincuenta inventos (el código de barras, el aire acondicionado, el iPhone…) y cómo cada uno abrió oportunidades nuevas que nadie había visto. La mejor escuela para entrenar el ojo del «¿qué viene después?».</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">▶</div>
  <div class="mf__type">Ver</div>
  <div class="mf__title">¿Cómo encontrar oportunidades de negocio? — Tengo un plan</div>
  <div class="mf__author">YouTube · ~20 min</div>
  <div class="mf__desc">El canal entrevista a fundadores españoles preguntando exactamente eso: cómo vieron lo que nadie veía. Casos en castellano y de nuestra escala.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">@</div>
  <div class="mf__type">Seguir</div>
  <div class="mf__title">marketingexamples.com</div>
  <div class="mf__author">Web</div>
  <div class="mf__desc">Casos cortos de marketing y oportunidades de nicho desmenuzados. Cada caso es una mini-clase sobre cómo alguien encontró un hueco y lo convirtió en negocio.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">✎</div>
  <div class="mf__type">Hacer</div>
  <div class="mf__title">Tres cambios, tres oportunidades</div>
  <div class="mf__author">30 min</div>
  <div class="mf__desc">Identifica tres cambios recientes en tu entorno: uno tecnológico (algo que antes no existía), uno social (un hábito que ha cambiado), uno legal o de regulación (algo que se ha permitido o prohibido). Para cada cambio, propón una oportunidad de emprendimiento asociada: ¿qué hueco se abre y quién podría querer llenarlo? Cada estudiante presenta su mejor oportunidad en un pitch de 60 segundos ante la clase. El resto vota cuál es más realista. Las tres más votadas se discuten: ¿cumplen las cuatro condiciones (tamaño, accesible, diferente, identificable)? Duración: 45 min. Materiales: cronómetro y pizarra.</div>
</div>
</section>
