<h1 id="consumo-inteligente-y-derechos-del-consumidor">Consumo inteligente y derechos del consumidor</h1>
<p>Cada vez que aceptáis cookies sin leer, pulsáis "comprar" en una app o os suscribís a una prueba gratis, alguien ha diseñado esa pantalla para que ganéis o perdáis. Saber leerla es la diferencia entre consumir y ser consumidos.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-class="tldr" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" class="tldr" data-marpit-pagination="2" style="--paginate:true;--class:tldr;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34"><p class="tldr__kicker">TL;DR</p>
<p class="pullquote">Somos consumidores antes que emprendedores. Esta unidad enseña a reconocer técnicas comerciales que nos manipulan (publicidad agresiva, letra pequeña, dark patterns ) y los derechos básicos que la ley te reconoce. Antes de aprender a vender, aprende a comprar sin que te tomen el pelo.</p>
</section>

  <p class="caso__kicker">CASO REAL</p>
  <h2>«Envío gratis» que cuesta 0,99 € escondidos al final del carrito</h2>
  <p class="caso__body-text">En 2023, varios estudios de la Organización de Consumidores y Usuarios (OCU) y de plataformas como Wallapop, Glovo o Vinted documentaron cómo el precio anunciado y el precio final que aparece al pagar pueden diferir en un 20-40 %. Tarifas «de servicio», «costes de envío opcional» marcados por defecto, comisiones que aparecen solo al final del proceso. En 2023 Glovo subió un 30 % su tarifa de servicio sin previo aviso, generando miles de quejas. Algunas prácticas son ilegales, otras están al límite .</p>
  <p class="caso__pregunta">¿Son legales estas prácticas? ¿Por qué las autoridades no las paran?</p>
  <p class="caso__fuente">Adaptado de informes de la OCU y CNMC · 2023-2024</p>

<h2 id="objetivos-de-la-unidad">Objetivos de la unidad</h2>
<ul>
<li>Identificar los seis derechos básicos del consumidor reconocidos por la Ley General para la Defensa de los Consumidores y Usuarios (1/2007).</li>
<li>Distinguir entre garantía legal de tres años y garantía comercial, conociendo qué cubre cada una y cómo se reclama.</li>
<li>Reconocer cinco dark patterns habituales en webs y apps, explicando por qué funcionan y cómo evitarlos.</li>
<li>Aplicar criterios sensatos para comparar precio, valor real e impacto antes de comprar online.</li>
<li>Conocer la ruta de reclamación en España, desde la hoja oficial hasta OCU, FACUA, AECOSAN y vía judicial.</li>
</ul>

<h2 id="qu%C3%A9-es-ser-consumidor-y-qu%C3%A9-dice-la-ley">Qué es ser consumidor y qué dice la ley</h2>
<p>En términos legales, consumidor es toda persona física que adquiere bienes o servicios para un uso ajeno a su actividad empresarial o profesional. Si compras un móvil para usarlo, eres consumidor; si lo compras para revenderlo en tu pequeño negocio, eres empresario y se te aplica otro marco. La distinción importa porque la ley protege al consumidor reconociendo que negocia en desigualdad : enfrente tiene una empresa con asesoría jurídica, contratos prerredactados y mucha más información sobre el producto.<br />
La norma de referencia en España es el Real Decreto Legislativo 1/2007 , que aprueba el texto refundido de la Ley General para la Defensa de los Consumidores y Usuarios (LGDCU). Es la traducción al ordenamiento español de varias directivas europeas, y ha sido modificada en los últimos años para incorporar la Directiva 2011/83/UE sobre derechos de los consumidores y el Real Decreto-ley 7/2021 , que amplió la garantía legal a tres años.</p>
<h3 id="los-seis-derechos-b%C3%A1sicos">Los seis derechos básicos</h3>
<p>El artículo 8 de la LGDCU reconoce seis derechos básicos a todo consumidor en España:</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<p>Estos seis derechos no son aspiraciones genéricas: cada uno habilita reclamaciones concretas que veremos a lo largo de la unidad.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="etiquetado-precio-y-publicidad">Etiquetado, precio y publicidad</h2>
<p>El primer derecho —información veraz— se materializa en tres frentes muy regulados.</p>
<h3 id="etiquetado">Etiquetado</h3>
<p>Todo producto puesto a la venta en España debe llevar etiqueta en castellano (y en la lengua cooficial cuando proceda) con, al menos: nombre del producto, identificación del fabricante o importador, composición o ingredientes, instrucciones de uso si son relevantes, advertencias de seguridad y fecha de caducidad o consumo preferente en alimentación. En alimentación se añade la información nutricional obligatoria (Reglamento UE 1169/2011) y los alérgenos destacados dentro de la lista de ingredientes.</p>
<h3 id="precio">Precio</h3>
<p>El precio debe mostrarse antes de la compra , de forma clara, e incluyendo todos los impuestos. En productos de gran consumo es obligatorio mostrar también el precio por unidad de medida (€/kg, €/litro), precisamente para que el cliente pueda comparar formatos distintos sin echar cuentas. Si en el supermercado una marca aparece a 2,40 €/500 g y la blanca a 2,10 €/500 g, mirar el €/kg evita la trampa habitual del &quot;envase más grande siempre sale más barato&quot; (que muchas veces no es cierto).</p>
<h3 id="publicidad">Publicidad</h3>
<p>La publicidad debe ser veraz, identificable como tal y no engañosa. La Ley 34/1988 General de Publicidad y la Ley 3/1991 de Competencia Desleal definen como ilícita la publicidad que induce a error sobre las características esenciales del producto o que oculta información necesaria para una decisión informada. Quien se siente engañado puede acudir a Autocontrol (jurado de la industria) o, mejor, a la autoridad pública de consumo.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-class="curiosity" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" class="curiosity" data-marpit-pagination="9" style="--paginate:true;--class:curiosity;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="nota">NOTA</h2>
<p>No toda hipérbole es ilegal. Decir "el mejor café del mundo" es dolus bonus : una exageración comercial que el consumidor medio reconoce como subjetiva. Es legal. En cambio, anunciar un seguro como "sin franquicia" cuando sí la tiene escondida en letra pequeña es publicidad engañosa : afirma un hecho objetivo y verificable que resulta falso. La frontera no está en el tono sino en la verificabilidad de la afirmación .</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="la-garant%C3%ADa-legal-de-tres-a%C3%B1os">La garantía legal de tres años</h2>
<p>Uno de los derechos peor entendidos en España es la garantía . Existen dos tipos y conviene no confundirlos.</p>
<h3 id="garant%C3%ADa-legal">Garantía legal</h3>
<p>Desde el Real Decreto-ley 7/2021 (que incorporó la Directiva UE 2019/771), todo producto nuevo comprado en la Unión Europea tiene una garantía legal de tres años desde la entrega. Antes eran dos. La garantía obliga al vendedor —no al fabricante, importante— a responder si el producto no es conforme: no funciona, falla pronto, no coincide con lo descrito, no es duradero según lo que se podía esperar.<br />
El cliente puede exigir, en este orden de preferencia: reparación, sustitución, rebaja del precio o resolución del contrato (devolución y reintegro). El vendedor no puede imponer una solución distinta a la elegida por el consumidor si la elegida es razonable. Y todos los gastos de la reparación (transporte, materiales, mano de obra) los asume el vendedor.<br />
Para productos de segunda mano, comprador y vendedor pueden pactar un plazo menor, pero nunca inferior a un año .</p>
<h3 id="garant%C3%ADa-comercial">Garantía comercial</h3>
<p>Es la que añaden voluntariamente fabricante o vendedor: &quot;garantía extra de 2 años&quot; , &quot;5 años de cobertura premium&quot; . Puede ampliar la legal pero nunca reducirla . Si la garantía comercial te promete dos años y la legal te da tres, prevalece la legal. Si te promete cinco, prevalece la comercial durante esos cinco años.<br />
La trampa habitual: el vendedor intenta convencerte de que la garantía legal es de uno o dos años para venderte un seguro adicional. Es falso desde 2022. La garantía legal son tres años en producto nuevo, sin coste, por ley.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="dark-patterns-cuando-el-dise%C3%B1o-juega-contra-ti">Dark patterns: cuando el diseño juega contra ti</h2>
<p>Hasta aquí, los derechos clásicos. La parte nueva, y la que diferencia este libro de la mayoría de manuales de 4º ESO, son los dark patterns (patrones oscuros): elecciones deliberadas de diseño en webs y apps pensadas para que el usuario haga algo que no haría si tuviera la información clara y la opción contraria igual de visible.<br />
El término lo acuñó el diseñador británico Harry Brignull en 2010. Hoy hay catálogos de más de cien variantes, y la Comisión Europea los considera prácticas comerciales desleales prohibidas bajo la Digital Services Act (Reglamento UE 2022/2065) cuando aparecen en plataformas grandes. Veamos los cinco más habituales en webs y apps que probablemente uséis cada semana.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="curiosity" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" class="curiosity" data-marpit-pagination="12" style="--paginate:true;--class:curiosity;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="nota-1">NOTA</h2>
<p>Un dark pattern es un elemento de interfaz —botón, texto, flujo de pasos— diseñado a propósito para que el usuario tome una decisión contraria a sus intereses: gastar más, suscribirse sin querer, ceder datos, no cancelar. No es un error del programador ni un descuido: es una elección de diseño con un objetivo de negocio detrás. La asimetría entre la opción que beneficia a la empresa (grande, visible, en color principal) y la que beneficia al usuario (pequeña, gris, escondida) es la firma característica.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h3 id="1-forced-continuity-continuidad-forzada">1. Forced continuity (continuidad forzada)</h3>
<p>Te ofrecen una prueba gratis de 30 días. Para acceder a la prueba tienes que dejar tu tarjeta. Cuando pasan los 30 días, te cobran automáticamente sin avisar. Si no estabas atento, ya estás suscrito. Lo practican Amazon Prime, Netflix, casi todas las plataformas de streaming, los gimnasios online y mucho software por suscripción. La ley exige avisar antes del cargo, pero el aviso suele ser un email entre veinte, perfectamente diseñado para que no se vea.</p>
<h3 id="2-roach-motel-motel-de-cucarachas">2. Roach motel (motel de cucarachas)</h3>
<p>Fácil entrar, imposible salir. Suscribirte a un servicio te lleva dos clics; cancelarlo te lleva ocho menús, una llamada por teléfono o un chat de soporte que tarda 40 minutos. El nombre es del catálogo de Brignull y describe productos como ciertos periódicos online, telcos y servicios premium de redes sociales.</p>
<h3 id="3-confirmshaming-avergonzar-al-que-rechaza">3. Confirmshaming (avergonzar al que rechaza)</h3>
<p>La opción de rechazar está formulada para que sientas vergüenza al pulsarla: &quot;No, gracias, prefiero seguir tirando el dinero&quot; , &quot;No quiero ahorrar&quot; , &quot;Prefiero no aprender nada nuevo&quot; . Es manipulación emocional explícita. Los newsletters lo usan mucho.</p>
<h3 id="4-drip-pricing-precio-que-va-goteando">4. Drip pricing (precio que va goteando)</h3>
<p>El precio inicial es muy bajo. A medida que avanzas en el proceso de compra, aparecen tasas, suplementos, seguros opcionales preseleccionados, cargos por equipaje, cargos por pagar con tarjeta, cargos por elegir asiento... Al final pagas dos o tres veces el precio inicial. Es la firma de Ryanair, Booking, Vueling, casi todas las aerolíneas low cost y muchas reservas online.</p>
<h3 id="5-misdirection-desv%C3%ADo-de-la-atenci%C3%B3n">5. Misdirection (desvío de la atención)</h3>
<p>Dos botones, uno enorme y verde que dice &quot;Continuar comprando&quot; o &quot;Aceptar todo&quot; ; otro pequeño, gris, semioculto en una esquina que dice &quot;No, gracias&quot; o &quot;Rechazar todas&quot; . Tu vista va al primero. El diseño está manipulando tu mirada para que pulses lo que conviene a la empresa, no a ti. Es la base del 80 % de los banners de cookies que veis cada día.</p>
</section>

<h2 id="11-clics-para-cancelar-prime-cuando-la-ftc-dice-basta">11 clics para cancelar Prime: cuando la FTC dice basta</h2>
<p>En 2023 la Federal Trade Commission (la autoridad de consumo de Estados Unidos) demandó a Amazon por el proceso de cancelación de Amazon Prime : 11 clics, 6 páginas y 15 opciones distintas para llegar al botón final, frente a 2 clics para suscribirse. Documentos internos mostraban que Amazon llamaba al proceso "Project Iliad" internamente: una referencia a la Ilíada porque era "largo y doloroso" . En septiembre de 2024 la causa seguía abierta y la FTC pedía sanciones millonarias. En la UE la Digital Services Act prohíbe expresamente exigir más pasos para cancelar que para contratar. España incorporó este principio en la reforma de la LGDCU de 2022.</p>

<h2 id="comercio-electr%C3%B3nico-el-derecho-de-desistimiento">Comercio electrónico: el derecho de desistimiento</h2>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h3 id="en-qu%C3%A9-consiste">En qué consiste</h3>
<p>Si compras online o por teléfono, dispones de 14 días naturales desde la entrega para devolver el producto sin justificar el motivo . No tienes que decir que está defectuoso, ni que no te gusta el color, ni explicarte. La empresa debe reintegrarte el dinero, incluidos los gastos de envío iniciales, en un plazo máximo de 14 días desde que comuniques la devolución.<br />
El vendedor está obligado a informarte de este derecho antes de la compra. Si no te informa, el plazo de desistimiento se amplía a 12 meses : la sanción por no avisar es perder durante un año la seguridad jurídica del plazo corto.</p>
<h3 id="excepciones">Excepciones</h3>
<p>No aplica a:</p>
<ul>
<li>Productos personalizados (un grabado con tu nombre, una camiseta con tu foto).</li>
<li>Productos sellados que se hayan abierto por motivos higiénicos o de salud (cosméticos abiertos, ropa interior usada, software desprecintado).</li>
<li>Bienes perecederos o que caduquen rápidamente (alimentación fresca).</li>
<li>Servicios ya prestados completamente con tu consentimiento previo.</li>
<li>Alojamiento, transporte o entradas a espectáculos en fecha concreta .<br />
Fuera de estas excepciones, el derecho de desistimiento es irrenunciable. Una tienda online que escribe &quot;no admitimos devoluciones&quot; está infringiendo la ley europea, no aplicando una política comercial.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="rgpd-y-datos-personales">RGPD y datos personales</h2>
<p>Cuando compras o navegas online, no solo intercambias dinero: intercambias datos personales . El Reglamento UE 2016/679 (RGPD) y la Ley Orgánica 3/2018 te reconocen seis derechos sobre tus datos: acceso, rectificación, supresión (el famoso derecho al olvido ), oposición, limitación del tratamiento y portabilidad.<br />
En la práctica esto significa que cualquier web a la que hayas dado tu email está obligada a:</p>
<ul>
<li>Decirte qué datos tiene tuyos si se lo pides.</li>
<li>Borrarlos si lo pides y no hay obligación legal de conservarlos.</li>
<li>Pedirte consentimiento explícito para usarlos con fines distintos a los que aceptaste inicialmente.</li>
<li>No traspasarlos a terceros sin avisarte.<br />
Los banners de cookies que cubren media pantalla cumplen formalmente el RGPD, pero la mayoría son ejemplo de misdirection : el botón &quot;Aceptar todo&quot; es enorme y verde; el de &quot;Configurar&quot; o &quot;Rechazar&quot; es pequeño y gris. La Agencia Española de Protección de Datos (AEPD) ha multado a varias empresas por banners que dificultaban rechazar tanto como aceptar.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-class="example" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" class="example" data-marpit-pagination="20" style="--paginate:true;--class:example;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34"><p class="example__kicker">Caso real</p>
<h2 id="ejemplo-real">Ejemplo real</h2>
<div class="example__body">En mayo de 2024, la Dirección General de Consumo sancionó a Ryanair, Vueling, EasyJet y Volotea con un total de 150 millones de euros por una batería de prácticas que combinan varios dark patterns a la vez. Entre las conductas sancionadas: cobrar por subir a cabina el equipaje de mano cuando la ley de Navegación Aérea lo considera parte del billete, recargo por reservar asientos contiguos cuando se viaja con menores o personas dependientes, falta de transparencia sobre el precio final del servicio durante la compra (un caso de manual de drip pricing ) y no permitir el pago en metálico en aeropuerto. En noviembre de 2024 el Ministerio amplió las sanciones a cinco compañías hasta 179 millones de euros . La OCU calificó la resolución como "histórica" en materia de defensa del consumidor digital. Es el ejemplo más limpio que tenemos en España de cómo el precio "29 €" anunciado en pantalla acaba convertido en "87 €" al pulsar pagar —y de cómo eso se ha empezado a sancionar de verdad.</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="c%C3%B3mo-comparar-precios-sin-caer-en-trampas">Cómo comparar precios sin caer en trampas</h2>
<p>Los comparadores de precios (Idealo, Rastreator, Kayak, Trivago) son herramientas útiles pero conviene saber cómo ganan dinero ellos . La mayoría cobra comisión por afiliación: cuando compras a través del enlace que te muestran, reciben un porcentaje. Eso introduce el incentivo a destacar las ofertas que mejor pagan comisión, no necesariamente las mejores para ti.<br />
Algunas reglas prácticas:</p>
<ul>
<li>No te quedes con el primer resultado . Compara al menos tres comparadores distintos, porque cada uno tiene afiliaciones diferentes.</li>
<li>Mira el precio total , no el destacado. Suma envío, devolución, posibles tasas, garantía. Un producto a 99 € con 12 € de envío y devolución no gratuita puede ser peor oferta que otro a 105 € con todo incluido.</li>
<li>Comprueba el vendedor , no solo la plataforma. En Amazon Marketplace o eBay no compras a Amazon o eBay: compras a un tercero, y la garantía y atención dependen de él.</li>
<li>Lee reseñas con sentido crítico . Si las cinco primeras valoraciones son todas de 5 estrellas con texto similar, hay alta probabilidad de reseñas falsas. La Comisión Europea exige desde 2022 que las plataformas indiquen si verifican que las reseñas son de compradores reales.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-class="example" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" class="example" data-marpit-pagination="22" style="--paginate:true;--class:example;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34"><p class="example__kicker">Caso real</p>
<h2 id="ejemplo-real-1">Ejemplo real</h2>
<div class="example__body">Bizum , propiedad de los principales bancos españoles, es gratuito para el usuario final en envíos entre particulares hasta 500 €/operación. La pantalla previa al envío muestra el importe exacto que recibirá el destinatario, sin coste. Verse (antigua empresa española adquirida por Square/Block en 2020 y cerrada en 2024) operaba con un modelo distinto: el envío básico era gratis pero algunas operaciones (envíos internacionales, retiradas a cuenta bancaria) llevaban comisiones que se aplicaban al destinatario y aparecían en una pantalla posterior al envío. FACUA recomendó durante años a Verse mostrar las comisiones antes de la transacción, no después. La diferencia entre los dos modelos no era solo de tarifas: era de transparencia precontractual , el principio que el artículo 60 de la LGDCU exige a cualquier operador económico. Bizum lo cumplía sin esfuerzo. Verse necesitó dos años de presión para hacerlo, y nunca terminó de adoptarlo del todo.</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="c%C3%B3mo-reclamar-paso-a-paso">Cómo reclamar paso a paso</h2>
<p>Si una empresa te ha vendido un producto defectuoso, te ha cobrado algo que no contrataste o se niega a aplicarte la garantía legal, tienes una ruta clara de reclamación. Reclamar funciona mucho más a menudo de lo que parece : la mayoría de empresas resuelven sin llegar a vía administrativa porque les sale más caro pelear que reembolsar.</p>
</section>

<p>La inmensa mayoría de reclamaciones legítimas se resuelven entre los pasos 1 y 4. Quien insiste, gana: las empresas saben que el coste reputacional de una mala resolución supera al de devolver el dinero.</p>
</section>

<h2 id="conexi%C3%B3n-con-el-proyecto-capstone">Conexión con el proyecto capstone</h2>
<p>Cuando llegue el momento de diseñar vuestro propio proyecto emprendedor (Unidades 9 y 10), volveréis a esta unidad desde el otro lado: tendréis que decidir qué información mostraréis a vuestros clientes, cómo gestionaréis devoluciones, qué política de garantía adoptaréis y, sobre todo, qué dark patterns no usaréis , aunque os tienten porque &quot;todos los hacen&quot;. Esta unidad es también un compromiso ético para vuestro propio futuro como personas que pueden diseñar interfaces y modelos de negocio.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="glosario">Glosario</h2>
<ul>
<li>Consumidor : persona que compra bienes o servicios para uso propio, no para revenderlos. La ley le da protección extra porque negocia en desigualdad frente a la empresa.</li>
<li>Etiquetado : información obligatoria que debe llevar un producto (nombre, fabricante, composición, advertencias, caducidad). En alimentación incluye los alérgenos.</li>
<li>Garantía legal : protección automática y gratuita de tres años en producto nuevo, que obliga al vendedor a responder si el producto falla o no es como se prometió.</li>
<li>Garantía comercial : la que añade voluntariamente el fabricante o vendedor. Puede ampliar la legal, pero nunca reducirla.</li>
<li>Derecho de desistimiento : derecho a devolver una compra online en 14 días sin dar explicaciones y recuperar el dinero, incluido el envío.</li>
<li>Dark pattern (patrón oscuro) : elemento de una web o app diseñado a propósito para que tomes una decisión contraria a tus intereses (gastar más, suscribirte, ceder datos).</li>
<li>Drip pricing : precio que va goteando: empieza muy bajo y va sumando tasas y suplementos hasta el final, típico de aerolíneas low cost .</li>
<li>Roach motel : dark pattern en el que es muy fácil suscribirse pero muy difícil cancelar.</li>
<li>RGPD : Reglamento europeo de protección de datos. Te da seis derechos sobre tus datos personales (acceso, rectificación, supresión, oposición, limitación y portabilidad).</li>
<li>Hoja de reclamaciones : documento oficial que todo establecimiento abierto al público está obligado a tener y a entregarte para reclamar.</li>
<li>OCU y FACUA : las dos grandes asociaciones de consumidores en España; orientan gratis y defienden casos de sus socios.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="para-profundizar">Para profundizar</h2>
<p>Recursos accesibles para defenderte mejor como consumidor:</p>
<ul>
<li>Web de la OCU y de FACUA (ocu.org y facua.org). Por qué encaja: guías prácticas, alertas de productos y modelos de reclamación gratuitos que puedes usar de verdad.</li>
<li>Vídeos sobre dark patterns del canal Nerdwriter o búsquedas tipo &quot;dark patterns explained&quot; (con subtítulos). Por qué encaja: ves capturas reales de las trampas de diseño que estudias en la unidad.</li>
<li>Reportajes de Salvados o El Objetivo sobre letra pequeña, aerolíneas o suscripciones (RTVE/laSexta a la carta). Por qué encaja: casos españoles reales de prácticas abusivas, contados de forma cercana.</li>
<li>Canales de divulgación sobre estafas y consumo digital (por ejemplo, perfiles de la Policía Nacional o de la OCU en redes). Por qué encaja: avisos cortos y actuales sobre fraudes que circulan ahora mismo entre jóvenes.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="preguntas-para-reflexionar">Preguntas para reflexionar</h2>
<p>Estas preguntas no tienen una respuesta única. Sirven para debatir en clase o pensar a solas:</p>
<ul>
<li>¿Te has suscrito alguna vez a una &quot;prueba gratis&quot; y luego te costó cancelarla? ¿Qué dark pattern reconoces ahora en aquella experiencia?</li>
<li>La próxima vez que aceptes cookies, fíjate en los dos botones. ¿Cuál es más grande y de color? ¿Por qué crees que está diseñado así?</li>
<li>Si te vendieran un móvil que se estropea a los 14 meses, ¿sabrías ahora qué hacer y a quién reclamar? Describe los dos primeros pasos que darías.</li>
</ul>

  <p class="caso__body-text">Algunas de estas prácticas son legales pero al límite . Las leyes españolas y europeas (Ley General para la Defensa de los Consumidores y Usuarios, Reglamento de Servicios Digitales, Directiva Omnibus) prohíben la publicidad engañosa y obligan a mostrar el precio final antes de pagar, pero la frontera con la «publicidad agresiva legal» es muy delgada. Las autoridades —Consumo, CNMC, AESIA— actúan ex post : multan después de detectar la infracción, no preventivamente. Por eso, el primer mecanismo de defensa eres tú: un consumidor formado que mira el precio total, no el anunciado, y que reclama cuando hay diferencia.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34">
<h2 id="lo-esencial-de-la-unidad-5">Lo esencial de la Unidad 5</h2>
<ul>
<li>Sois consumidores antes que emprendedores: la Ley 1/2007 os reconoce seis derechos básicos , encabezados por la información veraz y la protección frente a publicidad engañosa.</li>
<li>La garantía legal en producto nuevo es de tres años desde 2022 (RD-ley 7/2021). La garantía comercial puede ampliarla, nunca reducirla.</li>
<li>En comercio electrónico tenéis derecho de desistimiento de 14 días naturales sin justificar motivo. Si la web no os informa, el plazo se amplía a 12 meses.</li>
<li>Los dark patterns —forced continuity, roach motel, confirmshaming, drip pricing, misdirection— son diseño deliberado contra vuestros intereses. Reconocerlos es la primera defensa.</li>
<li>La ruta de reclamación funciona: hoja oficial → OMIC/Consumo → asociación (OCU/FACUA) → arbitraje → juzgado . La mayoría de casos legítimos se resuelven antes del juzgado.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-class="mirar-fora" data-theme="371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj" lang="en-US" class="mirar-fora" data-marpit-pagination="33" style="--paginate:true;--class:mirar-fora;--theme:371psiphy544nkdc836tqf1z8ns25m75qw0ziigzpgj;" data-marpit-pagination-total="34"><div class="mf__cell">
  <div class="mf__icon">§</div>
  <div class="mf__type">Leer</div>
  <div class="mf__title">Las trampas del deseo</div>
  <div class="mf__author">Dan Ariely · Ariel, 2008</div>
  <div class="mf__desc">El psicólogo que explica por qué somos malos consumidores incluso cuando creemos que somos racionales. Por qué un descuento nos atrapa, por qué pagamos más por algo «gratis» y por qué la letra pequeña funciona.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">▶</div>
  <div class="mf__type">Ver</div>
  <div class="mf__title">mi problema con Nespresso</div>
  <div class="mf__author">YouTube · canales de consumo · ~12 min</div>
  <div class="mf__desc">Caso real (Nespresso y los precios escondidos en las cápsulas) explicado en versión joven. Te entrena el ojo para detectar lo que no se ve a primera vista en cualquier compra.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">@</div>
  <div class="mf__type">Seguir</div>
  <div class="mf__title">@consumoengeneral</div>
  <div class="mf__author">Instagram · OCU y voces independientes</div>
  <div class="mf__desc">La cuenta de la OCU y otras voces del sector publican alertas, sentencias y trucos comerciales detectados esta semana. Suscríbete y verás un caso real cada 2-3 días.</div>
</div>
<div class="mf__cell">
  <div class="mf__icon">✎</div>
  <div class="mf__type">Hacer</div>
  <div class="mf__title">Tres anuncios, tres trampas</div>
  <div class="mf__author">20-30 min</div>
  <div class="mf__desc">Revisa tres publicidades recientes que hayas visto (Instagram, TikTok, YouTube, televisión). Para cada una, detecta al menos una técnica de manipulación : urgencia falsa («solo 24 h»), social proof inventada («miles de personas ya lo tienen»), letra pequeña que cambia las condiciones, comparación tramposa con el «precio anterior». Trae capturas si puedes. Cada estudiante presenta su anuncio favorito en 2 minutos, diseccionando las trampas. La clase vota cuál es el más manipulador. Variante: el profesor proyecta tres anuncios distintos y la clase los analiza en directo. Duración: 45 min. Materiales: proyector y móvil.</div>
</div>
</section>
